    <style>
        /* สไตล์หลักจาก UI Canva ที่คุณชอบ */
        * { font-family: 'Kanit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { box-sizing: border-box; background-color: #f3f4f6; margin: 0; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #fde047 0%, #f59e0b 50%, #d8a5d8 100%); }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .pulse-yellow { animation: pulseYellow 1.5s infinite; }
        @keyframes pulseYellow {
            0%, 100% { background-color: #fefce8; border-color: #fde047; }
            50% { background-color: #fef08a; border-color: #eab308; }
        }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .order-card { transition: all 0.3s ease; }
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 9999px; font-weight: bold; }
        
        .topping-btn { transition: all 0.2s; border: 1px solid #e5e7eb; }
        .topping-btn.active { background: #22c55e; color: white; border-color: #22c55e; }
        
        .tab-btn { transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { background: white; color: #ea580c; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-weight: bold; border: none; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* สไตล์สำหรับของหมด */
        .sold-out { opacity: 0.5; filter: grayscale(100%); pointer-events: none; position: relative; }
        .sold-out::after { content: "วัตถุดิบหมด"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: #ef4444; color: white; padding: 0.25rem 1rem; border-radius: 1rem; font-weight: bold; font-size: 0.8rem; z-index: 20; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Loader & Toast */
        .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 20px; z-index: 100000; font-weight: 500; font-size: 14px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: max-content; max-width: 90%; text-align: center; }

        /* ระบบพิมพ์บิล */
        #receipt-print { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #receipt-print, #receipt-print * { visibility: visible !important; }
            #receipt-print { display: block; position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; font-family: 'Kanit', sans-serif; color: black; padding: 10px; }
            .no-print { display: none !important; }
        }
    </style>
</head>

        // ========================================================
        // 4. CORE ENGINE (Initialization & Listeners)
        // ========================================================
        window.showToast = (msg) => {
            const t = document.getElementById('ui-toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        };

        window.onload = async () => {
            render(); // โชว์ Loader
            
            // 1. ตั้งค่า Listeners ดึงข้อมูลแบบ Real-time
            db.ref('stock').on('value', snap => {
                if (!snap.exists()) { db.ref('stock').set(initialStock); dbStock = initialStock; } 
                else { dbStock = snap.val(); }
                if (['customer', 'staff'].includes(currentView)) render();
            });

            db.ref('orders').on('value', snap => {
                allOrders = snap.val() || {};
                if (['customer', 'staff'].includes(currentView)) render();
            });

            db.ref('table_sessions').on('value', snap => { activeSessions = snap.val() || {}; });

            // ดักฟังเสียง AI (เฉพาะออเดอร์ใหม่)
            db.ref('orders').on('child_added', snap => {
                const tId = snap.key; const items = snap.val();
                Object.entries(items).forEach(([id, item]) => {
                    if (item.status === 'pending' && !item.announced) {
                        let type = item.order_type === 'preorder' ? 'พรีออเดอร์' : item.order_type === 'takeaway' ? 'กลับบ้าน' : 'ทานร้าน';
                        playVoice(`คิวใหม่ ${type} โต๊ะ ${tId}`);
                        db.ref(`orders/${tId}/${id}`).update({ announced: true });
                    }
                });
            });

            // 2. ตรวจสอบเส้นทางการเข้าใช้งาน (Routing)
            const urlParams = new URLSearchParams(window.location.search);
            const pTable = urlParams.get('table'); const pToken = urlParams.get('token');

            if (pTable && pToken) {
                // 🧔 ฝั่งลูกค้า (มี QR Code)
                try {
                    const snap = await db.ref(`table_sessions/${pTable}`).once('value');
                    if (snap.exists() && snap.val() === pToken) {
                        currentTable = pTable; currentToken = pToken;
                        
                        // ฟังตะกร้ารวมของโต๊ะ
                        db.ref(`carts/${pTable}`).on('value', cSnap => { 
                            cartShared = cSnap.val() || {}; 
                            if(currentView === 'customer') render();
                            // อัปเดต Modal ถ้าเปิดอยู่
                            const mBox = document.getElementById('modal-container');
                            if(!mBox.classList.contains('hidden') && document.getElementById('cart-context-flag')) renderCartModal('customer');
                        });

                        // ตรวจสอบว่าเคยยอมรับ PDPA หรือยัง
                        if (localStorage.getItem('cust_pdpa') === 'true') { currentView = 'customer'; } 
                        else { currentView = 'cust_pdpa'; }
                    } else { currentView = 'error_qr'; }
                } catch(e) { currentView = 'error_qr'; }
            } else {
                // 👨‍🍳 ฝั่งพนักงาน (เข้าลิงก์ตรง)
                try {
                    await liff.init({ liffId: LIFF_ID });
                    if (liff.isLoggedIn()) {
                        const profile = await liff.getProfile();
                        const snap = await db.ref(`users/${profile.userId}`).once('value');
                        if (snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'staff')) {
                            staffProfile = profile; userRole = snap.val().role;
                            currentView = 'staff'; // Fast Track เข้าครัวทันที
                            window.showToast(`สวัสดีคุณ ${profile.displayName}`);
                        } else if (!snap.exists()) {
                            await db.ref(`users/${profile.userId}`).set({ name: profile.displayName, role: 'pending' });
                            currentView = 'pending_approval';
                        } else { currentView = 'pending_approval'; }
                    } else {
                        currentView = 'staff_login'; // โชว์หน้ากติกา + ปุ่ม Login
                    }
                } catch(e) { 
                    console.error(e); currentView = 'staff_login'; // ให้ Fallback ไว้เทสบนเว็บได้
                }
            }
            render();
        };

        // ========================================================
        // 5. VIEW RENDERER (ฟังก์ชันสลับหน้าจอสุดเสถียร)
        // ========================================================
        function render() {
            const app = document.getElementById('app');
            switch(currentView) {
                case 'loader': app.innerHTML = `<div class="min-h-full gradient-bg flex flex-col items-center justify-center p-6"><div class="loader"></div><p class="mt-4 font-bold text-white text-lg animate-pulse">กำลังโหลดข้อมูล...</p></div>`; break;
                case 'error_qr': app.innerHTML = `<div class="min-h-full gradient-bg flex flex-col items-center justify-center p-6 text-white text-center"><div class="text-6xl mb-4">❌</div><div class="text-2xl font-bold mb-2">QR Code ไม่ถูกต้อง</div><div class="text-lg opacity-90">กรุณาสแกน QR Code ใหม่จากพนักงาน</div></div>`; break;
                case 'pending_approval': app.innerHTML = `<div class="min-h-full gradient-bg flex flex-col items-center justify-center p-6 text-white text-center"><div class="text-6xl mb-4">⏳</div><div class="text-2xl font-bold mb-2">รอการอนุมัติสิทธิ์</div><div class="text-base opacity-90 mb-6">ระบบบันทึกข้อมูลแล้ว รอแอดมินอนุมัติครับ</div><button onclick="liff.logout();location.reload();" class="bg-white text-orange-600 px-6 py-3 rounded-xl font-bold">ออกระบบ</button></div>`; break;
                case 'staff_login': renderStaffLogin(app); break;
                case 'cust_pdpa': renderCustPDPA(app); break;
                case 'customer': renderCustomerApp(app); break;
                case 'staff': renderStaffApp(app); break;
            }
        }

        // --- View: Staff Login ---
        function renderStaffLogin(app) {
            app.innerHTML = `
                <div class="min-h-full gradient-bg flex flex-col items-center justify-center p-5">
                    <div class="glass p-6 rounded-3xl card-shadow w-full max-w-md">
                        <div class="text-center mb-5">
                            <div class="text-6xl mb-2">👨‍🍳</div>

                            <p class="text-sm font-bold text-gray-500">ระบบหลังบ้านพนักงาน</p>
                        </div>

            db.ref(`table_sessions/${t}`).set(token).then(() => {
                const u = `${window.location.href.split('?')[0]}?table=${encodeURIComponent(t)}&token=${token}`;
                alert(`URL โต๊ะ ${t}:\n${u}`); // แบบง่าย แทน Modal กันบั๊ก
            });
        };
        window.clearTbl = () => { const t = document.getElementById('bill-sel').value; if(confirm(`ยืนยันเคลียร์โต๊ะ ${t} ?`)) { db.ref(`orders/${t}`).remove(); db.ref(`carts/${t}`).remove(); db.ref(`table_sessions/${t}`).remove(); window.showToast(`✅ ปิดโต๊ะ ${t} สำเร็จ`); } };
        
        window.printBill = async () => {
            const t = document.getElementById('bill-sel').value; const snap = await db.ref(`orders/${t}`).once('value'); const oObj = snap.val();
            if(!oObj) return window.showToast(`❌ ไม่มีออเดอร์ที่โต๊ะ ${t}`);
            let html = `<div style="text-align:center; margin-bottom: 10px;"><h2 style="margin:0; font-size:16px;">${config.shop_name}</h2><p style="margin:0; font-size:12px;">${config.shop_address}</p><p style="margin:5px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 4px 0; font-weight:bold;">โต๊ะ/คิว: ${t}</p></div><table style="width:100%; font-size:12px; border-collapse: collapse; margin-bottom: 10px;">`;
            let total = 0;
            Object.values(oObj).forEach(i => { total += (i.price * i.qty); html += `<tr><td style="padding: 2px 0;">${i.name} ${i.topping?`<br><span style="font-size:10px;">+${i.topping}</span>`:''}</td><td style="text-align:center;">x${i.qty}</td><td style="text-align:right;">${i.price * i.qty}</td></tr>`; });
            html += `</table><div style="text-align:center;"><p style="margin:5px 0; border-top: 1px dashed black; padding-top: 5px; font-size: 14px; font-weight:bold;">ยอดรวม: ฿${total}</p><p style="margin:5px 0 0 0; font-size:12px;">ขอบคุณที่ใช้บริการ 🙏</p></div>`;
            document.getElementById('print-area').innerHTML = html; setTimeout(() => { window.print(); }, 200);
        };

        // ========================================================
        // 8. ระบบ MODALS กลาง (สั่งอาหาร & ตะกร้า)
        // ========================================================
        function checkOutStock(item) { for (const ing of item.ingredients || []) { if ((dbStock[ing] || 0) <= 0) return true; } return false; }
        
        window.renderAddModal = (id, mode) => {
            selectedMenuObj = menus.find(m => m.id === id); tempToppings = []; tempQty = 1;
            const c = document.getElementById('modal-container');
            let topsHtml = toppings.map(t => {
                const out = (dbStock[t.useStock] !== undefined && dbStock[t.useStock] <= 0); if(out) return '';
                return `<label class="flex justify-between items-center p-3 bg-white rounded-xl border border-gray-200 cursor-pointer shadow-sm"><div class="flex items-center gap-2"><input type="checkbox" onchange="toggleTempTop('${t.name}', ${t.price}, '${t.useStock}', this.checked)" class="w-4 h-4 accent-orange-500"><span class="font-bold text-gray-700 text-sm">${t.name}</span></div><span class="text-orange-600 font-black text-sm">+฿${t.price}</span></label>`;
            }).join('') || '<div class="text-xs text-gray-400 font-bold p-2">ไม่มีท็อปปิ้ง</div>';

            c.innerHTML = `
                <div class="modal-content animate-slide-up w-full max-w-md bg-white rounded-t-3xl p-6 relative">
                    <button onclick="document.getElementById('modal-container').classList.replace('flex','hidden')" class="absolute top-4 right-4 bg-gray-100 w-10 h-10 rounded-full font-bold text-gray-500">✕</button>
                    <div class="flex items-center gap-4 mb-4"><div class="text-5xl drop-shadow-sm">${selectedMenuObj.emoji}</div><div><h3 class="text-xl font-black text-gray-800 leading-tight">${selectedMenuObj.name}</h3><p class="text-orange-600 font-black text-lg">฿${selectedMenuObj.price}</p></div></div>
                    <div class="bg-orange-50 p-4 rounded-2xl mb-4 border border-orange-100"><label class="text-[12px] font-black text-theme-primary mb-2 block">🌟 เพิ่มท็อปปิ้ง</label><div class="grid grid-cols-2 gap-2">${topsHtml}</div></div>
                    <input type="text" id="temp-note" placeholder="📝 หมายเหตุ..." class="w-full bg-gray-50 border border-gray-200 p-3.5 rounded-xl outline-none font-medium text-sm mb-6">
                    <div class="flex items-center justify-center gap-6 mb-6 bg-gray-50 py-2 rounded-2xl w-max mx-auto border border-gray-100 px-4"><button onclick="tempQty=Math.max(1, tempQty-1); document.getElementById('t-qty').innerText=tempQty;" class="text-2xl font-black text-gray-400 active:scale-95">-</button><span id="t-qty" class="text-3xl font-black text-gray-800 w-6 text-center">1</span><button onclick="tempQty=Math.min(10, tempQty+1); document.getElementById('t-qty').innerText=tempQty;" class="text-2xl font-black text-orange-500 active:scale-95">+</button></div>
                    <button onclick="confirmTempAdd('${mode}')" class="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95">เพิ่มลงตะกร้า</button>
                </div>`;
            c.classList.remove('hidden'); c.classList.add('flex');
        };

        window.toggleTempTop = (n, p, s, isChecked) => { if(isChecked) tempToppings.push({name:n, price:p, stock:s}); else tempToppings = tempToppings.filter(t => t.name !== n); };
        
        window.confirmTempAdd = (mode) => {
            const note = document.getElementById('temp-note').value.trim(); let addP = 0, tNames = [], deds = { [selectedMenuObj.main]: 1 };
            tempToppings.forEach(t => { addP += t.price; tNames.push(t.name); deds[t.stock] = (deds[t.stock]||0) + 1; });
            const item = { id: selectedMenuObj.id, name: selectedMenuObj.name, emoji: selectedMenuObj.emoji, price: selectedMenuObj.price + addP, main: selectedMenuObj.main, topping: tNames.join(', '), note, stockDeductions: deds, qty: tempQty };
            
            if (mode === 'staff') { cartLocal[`c_${Date.now()}`] = item; window.showToast("✅ เพิ่มแล้ว"); render(); } 
            else { db.ref(`carts/${tableNo}/c_${Date.now()}`).set(item); window.showToast("✅ เพิ่มแล้ว"); }
            document.getElementById('modal-container').classList.replace('flex','hidden');
        };

        window.renderCartModal = (mode) => {
            const isStaff = mode === 'staff'; const itemsObj = isStaff ? cartLocal : cartShared; const items = Object.entries(itemsObj);
            let tot = 0, c = 0, html = "";
            if(items.length === 0) { html = '<div class="text-center py-16 text-gray-400 font-bold"><div class="text-6xl mb-4 opacity-30">🛒</div>ตะกร้าว่างเปล่า</div>'; }
            else {
                items.forEach(([k, i]) => {
                    tot += (i.price * i.qty); c += i.qty;
                    html += `<div class="bg-gray-50 p-3 rounded-2xl border border-gray-200 flex justify-between items-center shadow-sm"><div class="flex-1 pr-2"><div class="font-bold text-sm text-gray-800 leading-tight">${i.emoji} ${i.name}</div>${i.topping?`<div class="text-[10px] text-orange-600 font-bold mt-1">🌟 ${i.topping}</div>`:''}${i.note?`<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${i.note}</div>`:''}<div class="font-black text-gray-800 mt-1">฿${i.price*i.qty}</div></div><div class="flex items-center gap-2 bg-white p-1 rounded-xl border border-gray-200 shadow-sm"><button onclick="adjCartQty('${k}',-1, '${mode}')" class="w-8 h-8 rounded-lg font-bold text-gray-500 bg-gray-100 active:bg-gray-200">-</button><span class="font-black text-sm w-5 text-center">${i.qty}</span><button onclick="adjCartQty('${k}',1, '${mode}')" class="w-8 h-8 bg-orange-500 text-white rounded-lg font-bold active:scale-95">+</button></div></div>`;
                });
            }

            const ctn = document.getElementById('modal-container');
            ctn.innerHTML = `
                <div class="modal-content animate-slide-up w-full max-w-md bg-white rounded-t-3xl p-6 relative h-[85vh] flex flex-col">
                    <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3"><h3 class="text-xl font-black text-gray-800">🛒 ${isStaff ? 'ตะกร้า POS':'ตะกร้าของคุณ'}</h3><button onclick="document.getElementById('modal-container').classList.replace('flex','hidden')" class="bg-gray-100 w-10 h-10 rounded-full font-bold text-gray-500">✕</button></div>
                    ${!isStaff ? `<div class="flex gap-2 mb-4 bg-gray-50 p-1.5 rounded-xl border border-gray-200"><label class="flex-1 text-center py-2.5 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-theme-primary has-[:checked]:shadow-sm"><input type="radio" name="cartType" id="cartTypeDine" value="dine-in" class="hidden" checked> 🍽️ ทานที่ร้าน</label><label class="flex-1 text-center py-2.5 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-theme-primary has-[:checked]:shadow-sm"><input type="radio" name="cartType" id="cartTypeTake" value="takeaway" class="hidden"> 🥡 กลับบ้าน</label></div>` : ''}
                    <div class="flex-1 overflow-y-auto hide-scrollbar space-y-2 mb-4 pr-1" id="cart-item-list">${html}</div>
                    <div class="pt-4 border-t-2 border-gray-100"><div class="flex justify-between items-end mb-4 px-1"><span class="font-bold text-gray-500 text-sm">ยอดรวม</span><span class="text-3xl font-black text-orange-600">฿${tot}</span></div><button onclick="submitFinalOrder('${mode}')" class="w-full py-4.5 bg-gray-800 text-white rounded-2xl font-bold text-lg active:scale-95 shadow-xl">✅ ส่งออเดอร์เข้าครัว</button></div>
                </div><input type="hidden" id="cart-context-flag" value="${mode}">`;
            ctn.classList.remove('hidden'); ctn.classList.add('flex');
        };

        window.adjCartQty = (k, delta, mode) => {
            if(mode === 'staff') { const n = cartLocal[k].qty + delta; if(n<=0) delete cartLocal[k]; else cartLocal[k].qty = n; renderCartModal('staff'); render(); } 
            else { const n = cartShared[k].qty + delta; if(n<=0) db.ref(`carts/${tableNo}/${k}`).remove(); else db.ref(`carts/${tableNo}/${k}`).update({qty: n}); }
        };

        window.submitFinalOrder = (mode) => {
            const isStaff = mode === 'staff'; const items = Object.values(isStaff ? cartLocal : cartShared);
            if(items.length === 0) return window.showToast("ตะกร้าว่างเปล่า ส่งไม่ได้ครับ");

            let type = "", target = "", pTime = "";
            if(isStaff) {
                const elType = document.getElementById('pos-order-type'); const elName = document.getElementById('pos-target-name'); const elTime = document.getElementById('pos-time-input');
                if(!elType || !elName) { window.showToast("กรุณากลับไปหน้าสั่งอาหารเพื่อระบุข้อมูลโต๊ะ"); return; }
                type = elType.value; target = elName.value.trim() || "Walk-in"; pTime = type === 'preorder' ? elTime.value : "";
                if(type === 'preorder' && !pTime) return window.showToast("กรุณาระบุเวลารับอาหารพรีออเดอร์");
            } else {
                const ct = document.querySelector('input[name="cartType"]:checked'); type = ct ? ct.value : 'dine-in'; target = tableNo;
            }

            // หักสต๊อก
            let copyStock = {...dbStock}; let ok = true; let bad = "";
            items.forEach(i => { Object.entries(i.stockDeductions).forEach(([n, a]) => { const ded = a * i.qty; if(copyStock[n] !== undefined) { copyStock[n] -= ded; if(copyStock[n] < 0) { ok=false; bad=n; } } }); });
            if(!ok) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${bad}" ไม่พอครับ`);

            const payload = {}; items.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type, pickupTime:pTime}; });

            db.ref(`orders/${target}`).update(payload).then(() => {
                db.ref('stock').update(copyStock); document.getElementById('modal-container').classList.replace('flex','hidden');
                if(isStaff) { 
                    cartLocal = {}; 
                    if(document.getElementById('pos-target-name')) document.getElementById('pos-target-name').value=""; 
                    if(document.getElementById('pos-time-input')) document.getElementById('pos-time-input').value=""; 
                    render(); window.showToast("✅ บันทึกออเดอร์ POS ลงครัวแล้ว"); 
                } else { db.ref(`carts/${tableNo}`).remove(); window.showToast("✅ ส่งออเดอร์เข้าห้องครัวแล้ว!"); }
            });
        };

    </script>
</body>
</html>
