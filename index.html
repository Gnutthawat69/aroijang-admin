    <style>
        * { font-family: 'Kanit', sans-serif; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f3f4f6; margin: 0; }
        
        /* UI Classes จากระบบใหม่ */
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 50%, #f0932b 100%); }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .pulse-yellow { animation: pulseYellow 1.5s infinite; }
        @keyframes pulseYellow {
            0%, 100% { background-color: #fef3c7; border-color: #fbbf24; }
            50% { background-color: #fde047; border-color: #f59e0b; }
        }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .menu-card { transition: transform 0.1s; position: relative; z-index: 10; }
        .menu-card:active { transform: scale(0.95); }
        
        .status-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 9999px; font-weight: 600; }
        .tab-btn { transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { background: white; color: #ea580c; box-shadow: 0 2px 8px rgba(0,0,0,0.1); font-weight: bold; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Utils สำหรับระบบเรา */
        .hidden-view { display: none !important; }
        .sold-out { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        .sold-out::after { content: "วัตถุดิบหมด"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: #ef4444; color: white; padding: 0.25rem 1rem; border-radius: 1rem; font-weight: bold; font-size: 0.8rem; z-index: 20; width: max-content; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Modals */
        .modal-bg { position: fixed; inset: 0; background: rgba(31, 41, 55, 0.6); backdrop-filter: blur(4px); z-index: 99999; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal-bg.show { opacity: 1; visibility: visible; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 2rem 2rem 0 0; padding: 1.5rem; transform: translateY(100%); transition: transform 0.3s; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-bg.show .modal-content { transform: translateY(0); }
        
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 20px; z-index: 100000; font-weight: 500; font-size: 14px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: max-content; max-width: 90%; text-align: center;}
        
        .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🖨️ ระบบ Print CSS 🖨️ */
        #receipt-print { display: none; }
        @media print {
            body * { visibility: hidden !important; }
            #receipt-print, #receipt-print * { visibility: visible !important; }
            #receipt-print { display: block; position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; font-family: 'Kanit', sans-serif; color: black; padding: 5px; }
            .no-print { display: none !important; }
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);

                try {

                        tableNo = pTable; currentMode = "customer"; initCustomerMode();

                } catch(e) {}
            } else {
                try {
                    await liff.init({ liffId: LIFF_ID });

                    else { liff.login(); } // บังคับล็อกอินทันที ไม่โชว์หน้ากฎ

            }

                    currentMode = "staff"; window.showToast(`สวัสดี ${profile.displayName}`); initStaffMode();
                } else if (!snap.exists()) {
                    await set(ref(db, `users/${profile.userId}`), { name: profile.displayName, role: 'pending' });

        window.staffLogout = () => { if(liff.isLoggedIn()) liff.logout(); location.reload(); };

        window.changeTab = (tab) => {

                document.getElementById(`tab-content-${t}`).classList.add('hidden-view');

        function renderCategories(targetId) {

                    ${cat}
                </button>
            `).join('');
        }

        window.selectCategory = (cat) => {
            currentCat = cat;
            renderCategories('cust-categories'); renderCategories('staff-categories');
            buildMenuGrid('cust-menu-grid'); buildMenuGrid('staff-menu-grid');
        };

        function initCustomerMode() {
            window.switchView('view-customer'); document.getElementById('cust-table-label').innerText = tableNo;
            renderCategories('cust-categories');
            onValue(ref(db, 'stock'), snap => {
                if(!snap.exists()) {
                    const initStock = {"หมูกรอบ":20,"หมูสับ":50,"หมูชิ้น":50,"ตับ":20,"ปลาหมึก":20,"ลูกชิ้น":30,"ปลาดุกทอด":15,"เส้นใหญ่":30,"บะหมี่เหลือง":30};
                    set(ref(db, 'stock'), initStock); dbStock = initStock;
                } else { dbStock = snap.val(); }
                buildMenuGrid('cust-menu-grid');
            });
            onValue(ref(db, `carts/${tableNo}`), snap => { cartCustomer = snap.val() || {}; updateCartDisplay(); });
            onValue(ref(db, `orders/${tableNo}`), snap => { buildOrdersList(snap.val() || {}); });
        }

        function initStaffMode() {
            window.switchView('view-staff'); renderCategories('staff-categories');
            onValue(ref(db, 'stock'), snap => { dbStock = snap.val() || {}; buildMenuGrid('staff-menu-grid'); });
            onValue(ref(db, 'orders'), snap => {
                const all = snap.val() || {}; let q = [];
                Object.keys(all).forEach(t => { Object.keys(all[t]).forEach(id => { if(all[t][id].status !== 'done') q.push({t, id, ...all[t][id]}); }); });
                q.sort((a,b) => a.timestamp - b.timestamp); buildKDS(q);
            });
            onChildAdded(ref(db, 'orders'), snap => {
                const tName = snap.key; const items = snap.val();
                Object.entries(items).forEach(([id, item]) => {
                    if(item.status === 'pending' && !item.announced) {
                        let t = item.type === 'preorder' ? 'พรีออเดอร์' : item.type === 'takeaway' ? 'กลับบ้าน' : 'ทานร้าน';
                        playVoice(`คิวใหม่ ${t} โต๊ะ ${tName} เมนู ${item.name}`);
                        update(ref(db, `orders/${tName}/${id}`), { announced: true });
                    }
                });
            });
        }

        function buildMenuGrid(targetId) {
            const container = document.getElementById(targetId); if(!container) return;
            const filtered = currentCat === 'ทั้งหมด' ? menus : menus.filter(m => m.cat === currentCat);
            let html = "";
            filtered.forEach(m => {
                const isOut = (dbStock[m.main] !== undefined && dbStock[m.main] <= 0);
                html += `
                    <div class="menu-card p-4 flex flex-col items-center text-center ${isOut ? 'sold-out' : ''}" onclick="${isOut ? '' : `window.showAddModal('${m.id}')`}">

                        <div class="text-theme-primary font-black text-sm bg-orange-50 border border-orange-100 px-3 py-0.5 rounded-full">฿${m.price}</div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        window.showAddModal = (id) => {
            selectedMenu = menus.find(x => x.id === id);
            document.getElementById('m-add-name').innerText = selectedMenu.name; document.getElementById('m-add-price').innerText = `฿${selectedMenu.price}`; document.getElementById('m-add-note').value = "";
            let topsHtml = "";

                if(dbStock[t.useStock] > 0 || dbStock[t.useStock] === undefined) {
                    topsHtml += `<label class="flex justify-between items-center p-3 bg-white rounded-lg border border-gray-200 cursor-pointer shadow-sm hover:border-theme-primary"><div class="flex items-center gap-2"><input type="checkbox" class="t-chk w-4 h-4 accent-theme-primary" data-name="${t.name}" data-price="${t.price}" data-stock="${t.useStock}"><span class="font-bold text-gray-700 text-sm">${t.name}</span></div><span class="text-theme-primary font-black text-sm">+฿${t.price}</span></label>`;
                }
            });
            document.getElementById('m-add-toppings').innerHTML = topsHtml || '<div class="text-xs text-gray-400 p-2 font-bold">ไม่มีส่วนเสริมที่พร้อมให้บริการ</div>';
            document.getElementById('modal-add').classList.add('show');
        };

        window.confirmAdd = () => {
            const note = document.getElementById('m-add-note').value.trim(); let addPrice = 0, tNames = [], deductions = { [selectedMenu.main]: 1 };
            document.querySelectorAll('.t-chk:checked').forEach(c => { addPrice += parseInt(c.dataset.price); tNames.push(c.dataset.name); deductions[c.dataset.stock] = (deductions[c.dataset.stock] || 0) + 1; });
            const item = { id: selectedMenu.id, name: selectedMenu.name, price: selectedMenu.price + addPrice, main: selectedMenu.main, topping: tNames.join(", "), note, stockDeductions: deductions, qty: 1 };
            
            if(currentMode === "staff") { cartStaff[`c_${Date.now()}`] = item; window.showToast("✅ เพิ่มลงตะกร้าพนักงาน"); updateCartDisplay(); } 
            else { set(ref(db, `carts/${tableNo}/c_${Date.now()}`), item); window.showToast("✅ เพิ่มลงตะกร้าสำเร็จ"); }
            window.closeModal('modal-add');
        };

        window.openCart = (mode) => {
            if(mode === 'customer') { document.getElementById('m-cart-type-box').classList.remove('hidden-view'); document.getElementById('m-cart-title').innerText = "🛒 ตะกร้าสินค้าของคุณ"; } 
            else { document.getElementById('m-cart-type-box').classList.add('hidden-view'); document.getElementById('m-cart-title').innerText = "🛒 ตะกร้า (POS)"; }
            updateCartDisplay(); document.getElementById('modal-cart').classList.add('show');

        function updateCartDisplay() {
            const isStaff = currentMode === "staff"; const items = Object.entries(isStaff ? cartStaff : cartCustomer); let tot = 0, c = 0, html = "";
            if(items.length === 0) { html = '<div class="text-center py-16 text-gray-400 font-bold"><div class="text-6xl mb-4 opacity-30">🛒</div>ตะกร้าว่างเปล่า</div>'; } 
            else {
                items.forEach(([k, i]) => {
                    tot += (i.price * i.qty); c += i.qty;
                    html += `<div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-between items-center"><div class="flex-1 pr-2"><div class="font-bold text-sm text-theme-dark leading-tight">${i.name}</div>${i.topping ? `<div class="text-[10px] text-theme-primary font-bold mt-1">🌟 ${i.topping}</div>`:''}${i.note ? `<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${i.note}</div>`:''}<div class="font-black text-theme-dark mt-1">฿${i.price*i.qty}</div></div><div class="flex items-center gap-2 bg-white p-1 rounded-lg border border-gray-200 shadow-sm"><button onclick="window.adjQty('${k}',-1, ${isStaff})" class="w-7 h-7 rounded font-bold text-gray-500">-</button><span class="font-black text-sm w-5 text-center">${i.qty}</span><button onclick="window.adjQty('${k}',1, ${isStaff})" class="w-7 h-7 bg-theme-primary text-white rounded font-bold">+</button></div></div>`;
                });
            }
            document.getElementById('m-cart-items').innerHTML = html; document.getElementById('m-cart-total').innerText = `฿${tot}`;
            if(!isStaff && document.getElementById('cust-cart-badge')) document.getElementById('cust-cart-badge').innerText = c;
            if(isStaff && document.getElementById('pos-cart-badge')) { document.getElementById('pos-cart-badge').innerText = c; document.getElementById('pos-cart-total').innerText = `฿${tot}`; }
        }

        window.adjQty = (k, d, isStaff) => {
            if(isStaff) { const n = cartStaff[k].qty + d; if(n<=0) delete cartStaff[k]; else cartStaff[k].qty = n; updateCartDisplay(); } 
            else { const n = cartCustomer[k].qty + d; if(n<=0) remove(ref(db, `carts/${tableNo}/${k}`)); else update(ref(db, `carts/${tableNo}/${k}`), {qty:n}); }
        };

        window.submitCart = () => {
            const isStaff = currentMode === "staff"; const items = Object.values(isStaff ? cartStaff : cartCustomer);
            if(items.length === 0) return window.showToast("ตะกร้าว่างเปล่า ไม่สามารถส่งได้");
            let type = "", target = "", pTime = "";
            if(isStaff) {
                type = document.getElementById('pos-type').value; target = document.getElementById('pos-table-name').value.trim() || "Walk-in"; pTime = type === 'preorder' ? document.getElementById('pos-time').value : "";
                if(type === 'preorder' && !pTime) return window.showToast("กรุณาระบุเวลารับอาหาร");
            } else { type = document.querySelector('input[name="cartType"]:checked').value; target = tableNo; }

            let copyStock = {...dbStock}; let isOk = true; let badItem = "";
            items.forEach(i => { Object.entries(i.stockDeductions).forEach(([n, a]) => { const totalDed = a * i.qty; if(copyStock[n] !== undefined) { copyStock[n] -= totalDed; if(copyStock[n] < 0) { isOk=false; badItem=n; } } }); });
            if(!isOk) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${badItem}" ไม่พอ`);

            const payload = {}; items.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type:type, pickupTime:pTime}; });

            update(ref(db, `orders/${target}`), payload).then(() => {
                update(ref(db, 'stock'), copyStock); window.closeModal('modal-cart');
                if(isStaff) { cartStaff = {}; document.getElementById('pos-table-name').value = ""; document.getElementById('pos-time').value = ""; updateCartDisplay(); window.showToast("✅ บันทึกออเดอร์ลงครัว"); } 
                else { remove(ref(db, `carts/${tableNo}`)); window.showToast("✅ ส่งออเดอร์เข้าครัวเรียบร้อย!"); }
            });
        };

        function buildOrdersList(orders) {
            const c = document.getElementById('cust-orders-list'); const arr = Object.entries(orders);
            if(arr.length === 0) { c.innerHTML = '<div class="text-[12px] text-gray-400 text-center py-5 bg-white rounded-2xl border border-gray-200 font-bold">ยังไม่มีรายการสั่งอาหารครับ</div>'; return; }
            c.innerHTML = arr.map(([id, item]) => {
                let ui = item.status==='pending'?'<span class="text-yellow-600 bg-yellow-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-yellow-200">⏳ รอคิว</span>' :item.status==='preparing'?'<span class="text-blue-600 bg-blue-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-blue-200">🍳 กำลังปรุง</span>' :'<span class="text-green-600 bg-green-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-green-200">✅ เสิร์ฟแล้ว</span>';
                let btn = item.status==='pending'?`<button onclick="window.cancelMyOrder('${id}','${encodeURIComponent(JSON.stringify(item.stockDeductions))}',${item.qty})" class="text-[10px] text-red-500 font-bold border border-red-200 bg-red-50 px-3 py-1.5 rounded-xl active:scale-95 transition-all shadow-sm">ยกเลิก</button>`:'';
                return `<div class="bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center shadow-sm"><div class="flex-1"><div class="text-sm font-bold text-theme-dark">${item.name} <span class="text-gray-400 text-xs ml-1 font-black">x${item.qty}</span></div>${item.topping ? `<div class="text-[10px] text-theme-primary font-bold mt-1">🌟 ${item.topping}</div>` : ''}<div class="mt-2">${ui}</div></div><div>${btn}</div></div>`;
            }).join('');
        }
        
        window.cancelMyOrder = (id, strDed, qty) => {
            if(confirm("ยืนยันการยกเลิกเมนูนี้?")) {
                const d = JSON.parse(decodeURIComponent(strDed)); let ret = {};
                get(ref(db,'stock')).then(snap => {
                    const c = snap.val()||{}; Object.entries(d).forEach(([n,a]) => { if(c[n]!==undefined) ret[n] = c[n]+(a*qty); });
                    remove(ref(db, `orders/${tableNo}/${id}`)).then(() => { if(Object.keys(ret).length>0) update(ref(db,'stock'),ret); window.showToast("✅ ยกเลิกสำเร็จ"); });
                });
            }
        };

        function buildKDS(q) {
            const c = document.getElementById('kitchen-queue-list');
            if(q.length === 0) { c.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold bg-white rounded-3xl border border-dashed border-gray-300"><div class="text-5xl mb-4">😴</div>ไม่มีคิวอาหาร พักผ่อนได้เลย</div>'; return; }
            c.innerHTML = q.map((i, idx) => {
                let badge = i.type==='preorder'?`<div class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-lg font-bold animate-pulse mt-2 border border-yellow-300">⏰ รับ: ${i.pickupTime}</div>`:i.type==='takeaway'?`<div class="bg-gray-100 text-gray-500 text-[10px] px-2 py-1 rounded-lg font-bold mt-1 border border-gray-200">🥡 กลับบ้าน</div>`:`<div class="bg-orange-100 text-orange-600 text-[10px] px-2 py-1 rounded-lg font-bold mt-1 border border-orange-200">🍽️ ทานร้าน</div>`;
                return `<div class="bg-white rounded-2xl p-5 border-l-8 ${i.status==='pending'?'border-yellow-400 pulse-yellow':'border-blue-500'} card-shadow flex flex-col justify-between"><div><div class="flex justify-between items-start mb-3"><div><span class="bg-theme-dark text-white px-2 py-1 rounded-md text-[10px] font-bold shadow-sm">คิว ${idx+1}</span><h2 class="text-lg font-bold text-theme-dark mt-2 leading-tight">${i.name} <span class="text-theme-primary ml-1">x${i.qty}</span></h2></div><div class="text-right"><div class="text-xl font-black text-theme-dark">${i.t}</div>${badge}</div></div>${i.topping||i.note?`<div class="bg-gray-50 rounded-lg p-2 mb-4 border border-gray-200">${i.topping?`<div class="text-xs font-bold text-theme-primary mb-1">🌟 ${i.topping}</div>`:''}${i.note?`<div class="text-xs font-bold text-red-500">📌 ${i.note}</div>`:''}</div>`:'<div class="h-2"></div>'}</div><div class="flex gap-2 mt-auto">${i.status==='pending'?`<button onclick="window.kdsAction('${i.t}','${i.id}','preparing','${i.name}')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition-transform shadow-md">👨‍🍳 รับออเดอร์</button>`:`<button onclick="window.kdsAction('${i.t}','${i.id}','done','${i.name}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition-transform shadow-md">✅ ทำเสร็จ</button>`}</div></div>`;
            }).join('');
        }

        window.kdsAction = (t, id, stat, name) => {
            update(ref(db, `orders/${t}/${id}`), {status:stat}).then(() => {
                if(stat === 'preparing') playVoice(`รับออเดอร์ กำลังทำเมนู ${name}`);
                if(stat === 'done') playVoice(`เมนู ${name} โต๊ะ ${t} เสร็จเรียบร้อยครับ`);
            });
        };

        window.unlockAudio = () => {
            soundReady = true; let u = new SpeechSynthesisUtterance(""); window.speechSynthesis.speak(u); 
            document.getElementById('btn-sound-unlock').classList.add('hidden-view'); window.showToast("✅ เปิดเสียงสำเร็จ");
        };

        function playVoice(text) {
            if(!soundReady || !('speechSynthesis' in window)) return;
            const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
            let u = new SpeechSynthesisUtterance(cleanText); u.lang = 'th-TH'; u.rate = 1.0; window.speechSynthesis.speak(u);
        }

        window.generateQR = () => {
            const t = document.getElementById('qr-table-sel').value; const token = Math.random().toString(36).substring(2,10);
            set(ref(db, `table_sessions/${t}`), token).then(() => {
                const url = `${window.location.href.split('?')[0]}?table=${encodeURIComponent(t)}&token=${token}`;
                document.getElementById('qr-result-box').classList.remove('hidden-view');
                document.getElementById('qr-img-src').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
                document.getElementById('qr-test-link').href = url; window.showToast(`สร้าง QR Code สำเร็จ`);
            });
        };

        window.clearTable = () => {
            const t = document.getElementById('clear-table-sel').value;
            if(confirm(`ยืนยันการเคลียร์โต๊ะ ${t} ?\n(QR Code เดิมจะสั่งอาหารไม่ได้อีก)`)) {
                remove(ref(db, `orders/${t}`)); remove(ref(db, `carts/${t}`)); remove(ref(db, `table_sessions/${t}`));
                window.showToast(`✅ ปิดโต๊ะ ${t} เรียบร้อยแล้ว`);
            }
        };

        // 🖨️ ฟังก์ชันพิมพ์ใบเสร็จ (Receipt Printer)
        window.printReceipt = async () => {
            const t = document.getElementById('clear-table-sel').value;
            const snap = await get(ref(db, `orders/${t}`));
            const orders = snap.val();
            
            if(!orders) return window.showToast(`❌ ไม่พบข้อมูลการสั่งอาหารของ ${t}`);
            
            let html = `
                <div style="text-align:center; margin-bottom: 10px;">
                    <h2 style="margin:0; font-size:16px;">หนูแดง อาหารตามสั่ง</h2>
                    <p style="margin:0; font-size:12px;">คลองเปียะ จ.สงขลา</p>
                    <p style="margin:5px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 4px 0;">โต๊ะ/คิว: ${t}</p>
                    <p style="margin:0; font-size:10px;">วันที่: ${new Date().toLocaleString('th-TH')}</p>
                </div>
                <table style="width:100%; font-size:12px; border-collapse: collapse; margin-bottom: 10px;">
            `;
            
            let total = 0;
            Object.values(orders).forEach(i => {
                total += (i.price * i.qty);
                html += `
                    <tr>
                        <td style="padding: 2px 0;">${i.name} ${i.topping ? `<br><span style="font-size:10px;">+${i.topping}</span>` : ''}</td>
                        <td style="text-align:center; padding: 2px 0; vertical-align: top;">x${i.qty}</td>
                        <td style="text-align:right; padding: 2px 0; vertical-align: top;">${i.price * i.qty}</td>
                    </tr>
                `;
            });
            
            html += `
                </table>
                <div style="text-align:center;">
                    <p style="margin:5px 0; border-top: 1px dashed black; padding-top: 5px; font-size: 14px; font-weight:bold;">ยอดรวม: ฿${total}</p>
                    <p style="margin:5px 0 0 0; font-size:12px;">ขอบคุณที่ใช้บริการ</p>
                </div>
            `;
            
            document.getElementById('receipt-print').innerHTML = html;
            setTimeout(() => { window.print(); }, 200);
        };

    </script>
</body>
</html>
