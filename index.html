<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>กู้ระบบหนูแดง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: #fff0f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .rescue-box { background: white; padding: 30px; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border: 3px solid #fb7185; }
        .u-id-display { background: #f8fafc; border: 2px dashed #cbd5e1; padding: 15px; border-radius: 1rem; margin-top: 20px; word-break: break-all; display: none; }
    </style>
</head>
<body>

    <div class="rescue-box">
        <h2 class="fw-bold text-danger">🛠️ ปุ่มกู้ระบบ Admin</h2>
        <p class="text-muted mb-4">กดปุ่มด้านล่างเพื่อดูรหัส User ID ของคุณ<br>โดยไม่ต้องรอการอนุมัติ</p>
        
        <div class="d-grid gap-3">
            <button onclick="liff.login()" class="btn btn-primary rounded-pill py-3 fw-bold">1. กดเข้าสู่ระบบ LINE</button>
            
            <button onclick="getMyID()" class="btn btn-danger rounded-pill py-3 fw-bold">2. กดดูรหัส User ID ของฉัน</button>
        </div>

        <div id="display-area" class="u-id-display">
            <div class="small fw-bold text-secondary mb-1">รหัสของคุณคือ:</div>
            <div id="user-id-text" class="fw-bold text-dark fs-5"></div>
            <div class="mt-2 small text-danger">* นำรหัสนี้ไปใส่ใน Firebase โหนด users เพื่อเป็น admin ครับ</div>
        </div>
    </div>

    <script>
        async function initLIFF() {
            await liff.init({ liffId: "2009300498-iyTZochS" });
            if (liff.isLoggedIn()) {
                console.log("Logged In");
            }
        }

        async function getMyID() {
            try {
                if (!liff.isLoggedIn()) {
                    alert("กรุณากดปุ่ม 'เข้าสู่ระบบ LINE' ก่อนครับ");
                    return;
                }
                const profile = await liff.getProfile();
                document.getElementById('user-id-text').innerText = profile.userId;
                document.getElementById('display-area').style.display = 'block';
                // ก๊อปปี้รหัสให้อัตโนมัติด้วย
                navigator.clipboard.writeText(profile.userId);
                alert("ดึงรหัสสำเร็จ! และคัดลอกรหัสไว้ให้แล้วครับ");
            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
            }
        }

        initLIFF();
    </script>
</body>
</html>
