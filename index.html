    async function initApp() {
      render();
      
      db.ref('stock').on('value', snap => {
          if (!snap.exists()) {
              db.ref('stock').set(initialInventory);
              dbStock = initialInventory;
          } else {
              dbStock = snap.val();
          }
          if (['customer', 'pos'].includes(currentView)) render(); 
      });

      db.ref('orders').on('value', snap => {
          allOrders = snap.val() || {};
          if (['kitchen', 'admin', 'customer'].includes(currentView)) render();
      });

      db.ref('orders').on('child_added', snap => {
          const tId = snap.key;
          const items = snap.val();
          Object.entries(items).forEach(([id, item]) => {
              if (item.status === 'pending' && !item.announced) {
                  let type = item.order_type === 'preorder' ? 'พรีออเดอร์' : item.order_type === 'takeaway' ? 'กลับบ้าน' : 'ทานร้าน';

              }
          });
      });

      checkURLParams();
    }

    async function checkURLParams() {
      const params = new URLSearchParams(window.location.search);
      const table = params.get('table');
      const token = params.get('token');
      
      if (table && token) {
        const snap = await db.ref(`table_sessions/${table}`).once('value');
        if (snap.exists() && snap.val() === token) {
          currentTable = table;
          currentToken = token;
          currentView = 'customer';
          
          db.ref(`carts/${table}`).on('value', cartSnap => {
              sharedCart = cartSnap.val() ? JSON.parse(cartSnap.val()) : [];
              if (currentView === 'customer') render();
          });
          
        } else {
          currentView = 'invalid-qr';
        }
        render();
      } else {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const snap = await db.ref(`users/${profile.userId}`).once('value');
                if (snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'staff')) {
                    staffName = profile.displayName;
                    isLoggedIn = true;
                    currentView = 'staff'; 
                } else if (!snap.exists()) {
                    await db.ref(`users/${profile.userId}`).set({ name: profile.displayName, role: 'pending' });
                    currentView = 'pending-approval';
                } else {
                    currentView = 'pending-approval';
                }
            } else {
                // โชว์หน้า Landing + Logo + กฎระเบียบ
                currentView = 'landing';
            }
            render();
        } catch(e) {
            console.error(e);
            currentView = 'landing';
            render();
        }
      }
    }

    // ==================== KITCHEN (KDS) ====================
    function renderKitchen(container) {
      let q = [];
      Object.keys(allOrders).forEach(t => { 
          Object.keys(allOrders[t]).forEach(id => { 
              if(allOrders[t][id].status !== 'served') q.push({t, id, ...allOrders[t][id]}); 
          }); 
      });
      q.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      
      container.innerHTML = `
        <div class="min-h-full bg-gray-900">
          <div class="bg-gray-800 text-white p-4 flex justify-between items-center sticky top-0 z-10 shadow-md">
            <button onclick="currentView='staff';render()" class="text-gray-400 hover:text-white font-bold px-2 py-1">← กลับ</button>
            <div class="text-xl font-bold flex items-center gap-2">🔥 ห้องครัว KDS</div>
            <div class="text-sm text-gray-400 bg-gray-700 px-3 py-1 rounded-full">${q.length} คิว</div>
          </div>
          
          <div class="p-4">
              <button onclick="unlockAudio()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold mb-4 shadow-lg animate-pulse active:scale-95">🔊 แตะเพื่อเปิดเสียงเตือน AI</button>
              
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                  <div class="col-span-full text-center py-20 text-gray-500">
                    <div class="text-6xl mb-4">😴</div><div class="text-xl font-bold">ไม่มีออเดอร์ในขณะนี้</div>
                  </div>
                ` : q.map(order => renderKitchenCard(order)).join('')}
              </div>
          </div>
        </div>
      `;
    }

    function renderKitchenCard(order) {
      const items = typeof order.items === 'string' ? JSON.parse(order.items) : order.items;
      const isPreorderOrder = order.order_type === 'preorder';
      const isTakeaway = order.order_type === 'takeaway';
      
      let bgClass = 'bg-pink-50 border-pink-300';
      let badge = '<span class="status-badge bg-pink-200 text-pink-700">🍽️ ทานที่ร้าน</span>';
      if (isTakeaway) { bgClass = 'bg-gray-100 border-gray-300'; badge = '<span class="status-badge bg-gray-200 text-gray-700">📦 กลับบ้าน</span>'; }
      if (isPreorderOrder) { bgClass = 'pulse-yellow border-yellow-400'; badge = `<span class="status-badge bg-yellow-400 text-yellow-900 font-bold">⏰ พรีออเดอร์ ${order.preorder_time}</span>`; }
      
      const statusBadge = order.status === 'pending' ? '<span class="status-badge bg-yellow-200 text-yellow-800">⏳ รอคิว</span>' : '<span class="status-badge bg-blue-200 text-blue-800">🍳 กำลังปรุง</span>';
      
      return `
        <div class="rounded-2xl border-2 ${bgClass} p-4 order-card">
          <div class="flex justify-between items-start mb-3">
            <div><div class="text-2xl font-bold text-gray-800 leading-none mb-1">${order.t}</div><div class="text-xs text-gray-500 font-medium">${new Date(order.created_at).toLocaleTimeString('th-TH', {hour: '2-digit', minute: '2-digit'})}</div></div>
            <div class="space-y-1 text-right flex flex-col items-end">${badge}${statusBadge}</div>
          </div>
          <div class="space-y-2 mb-4">
            ${items.map(item => `
              <div class="bg-white/80 rounded-lg p-2 border border-gray-100">
                <div class="flex justify-between items-center"><span class="font-bold text-sm text-gray-800">${item.emoji} ${item.name}</span><span class="bg-orange-500 text-white px-2 py-0.5 rounded-md text-xs font-bold">x${item.quantity}</span></div>
                ${item.toppings && item.toppings.length > 0 ? `<div class="text-[11px] font-bold text-green-600 mt-1">+ ${item.toppings.map(t => t.name).join(', ')}</div>` : ''}
                ${item.note ? `<div class="text-[11px] font-bold text-orange-600 mt-1">📝 ${item.note}</div>` : ''}
              </div>
            `).join('')}
          </div>
          <div class="flex gap-2">
            ${order.status === 'pending' ? `<button onclick="acceptOrder('${order.t}', '${order.id}')" class="flex-1 bg-blue-500 text-white py-3 rounded-xl font-bold shadow active:scale-95 transition-transform">✓ รับทำ</button>` 
            : `<button onclick="completeOrder('${order.t}', '${order.id}')" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold shadow active:scale-95 transition-transform">✓ ทำเสร็จ</button>`}
          </div>
        </div>
      `;
    }

    async function acceptOrder(t, id) {
      speakThai(`รับออเดอร์ โต๊ะ ${t}`);
      await db.ref(`orders/${t}/${id}`).update({ status: 'cooking' });
    }

    async function completeOrder(t, id) {
      speakThai(`โต๊ะ ${t} เสิร์ฟได้เลยครับ`);
      await db.ref(`orders/${t}/${id}`).update({ status: 'served' });
    }

    window.unlockAudio = () => {
        soundReady = true; let u = new SpeechSynthesisUtterance(""); window.speechSynthesis.speak(u); 
        window.showToast("✅ ระบบเสียงเปิดทำงานแล้ว");
    };

    function speakThai(text) {
      if ('speechSynthesis' in window && soundReady) {
        const cleanText = text.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]/gu, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'th-TH'; utterance.rate = 0.9;
        speechSynthesis.speak(utterance);
      }
    }

            </div>

          </div>
          
          <div class="bg-white border-b p-3 overflow-x-auto hide-scrollbar sticky top-[130px] z-10 shadow-sm">

          <div class="flex-1 overflow-auto p-4">
            <div class="menu-grid">
              ${filteredMenu.map(item => {

                return `<button onclick="${outOfStock ? '' : `showToppingModal(${item.id})`}" class="bg-white rounded-2xl p-4 text-center card-shadow ${outOfStock ? 'opacity-50' : 'active:scale-95'} transition-transform border border-white">
                    <div class="text-4xl mb-2 drop-shadow-sm">${item.emoji}</div>
                    <div class="text-[13px] font-bold text-gray-800 leading-tight mb-2 h-8 flex items-center justify-center">${item.name}</div>
                    <div class="text-orange-600 font-black text-sm bg-orange-50 px-3 py-1 rounded-full w-max mx-auto">฿${item.price}</div>
                    ${outOfStock ? '<div class="text-xs font-bold text-red-500 mt-2 bg-red-50 rounded-md py-0.5">หมด</div>' : ''}
                  </button>`;
              }).join('')}

          ${cart.length > 0 ? `

              <div class="max-h-32 overflow-auto mb-3 space-y-2 custom-scroll pr-1">
                ${cart.map((item, idx) => `
                  <div class="flex justify-between items-center bg-gray-50 rounded-xl p-3 border border-gray-100">
                    <div class="flex-1">
                      <span class="text-sm font-bold text-theme-dark">${item.emoji} ${item.name} <span class="text-xs text-gray-400 ml-1">x${item.quantity}</span></span>
                      ${item.toppings?.length ? `<div class="text-[11px] font-bold text-green-600 mt-1">+${item.toppings.map(t=>t.name).join(', ')}</div>` : ''}

                    <div class="flex items-center gap-3">
                      <span class="text-sm font-black text-theme-primary">฿${(item.price + (item.toppings||[]).reduce((s,t)=>s+t.price,0)) * item.quantity}</span>
                      <button onclick="removeFromCart(${idx})" class="w-8 h-8 bg-white border border-gray-200 rounded-lg text-red-500 text-lg font-bold shadow-sm active:scale-95">×</button>
                    </div>

                `).join('')}
              </div>
              <div class="flex justify-between items-end mb-4 px-1">
                <span class="text-sm font-bold text-gray-500">ยอดรวมทั้งหมด</span>
                <span class="text-3xl font-black text-orange-600">฿${cartTotal}</span>

              <button onclick="showTableSelectModal()" class="w-full bg-theme-dark text-white py-4 rounded-2xl font-bold text-lg active:scale-95 transition-transform shadow-lg shadow-gray-400">

        </div>
        
        <div id="topping-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm"></div>
        <div id="table-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4 backdrop-blur-sm"></div>

    function checkOutOfStock(item) {
      for (const ing of item.ingredients || []) { if ((dbStock[ing] || 0) <= 0) return true; }
      return false;
    }

    function showToppingModal(itemId) {
      const item = menuItems.find(m => m.id === itemId); if (!item) return;
      const modal = document.getElementById('topping-modal');
      modal.innerHTML = `
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm animate-slide-up relative">
          <button onclick="closeToppingModal()" class="absolute top-4 right-4 bg-gray-100 w-10 h-10 rounded-full font-bold text-gray-500">✕</button>
          <div class="text-center mb-4">
            <div class="text-5xl mb-2 drop-shadow-md">${item.emoji}</div>
            <div class="text-xl font-black text-theme-dark mb-1">${item.name}</div>
            <div class="text-orange-600 font-black text-lg">฿${item.price}</div>
          </div>
          
          <div class="bg-orange-50 p-4 rounded-2xl mb-4 border border-orange-100">
            <div class="text-[12px] font-bold text-theme-primary mb-3 uppercase tracking-wider">🌟 เพิ่มท็อปปิ้ง</div>
            <div class="grid grid-cols-2 gap-2" id="topping-buttons">
              ${toppings.map(top => {
                const outOfStock = (dbStock[top.ingredient] || 0) <= 0;
                return `
                  <button onclick="${outOfStock ? '' : `toggleTopping('${top.id}')`}" id="top-${top.id}" class="topping-btn bg-white border border-gray-200 rounded-xl p-3 text-sm font-bold text-gray-700 shadow-sm ${outOfStock ? 'opacity-50' : 'active:scale-95'} flex flex-col items-center gap-1">
                    <span>${top.name}</span>
                    <span class="text-theme-primary">+฿${top.price}</span>
                    ${outOfStock ? '<span class="text-red-500 text-[10px] bg-red-50 px-2 rounded mt-1">หมด</span>' : ''}
                  </button>`;
              }).join('')}
            </div>
          </div>
          
          <div class="mb-5">
            <label class="text-[12px] font-bold text-gray-500 mb-2 block ml-1 uppercase">📝 หมายเหตุ</label>
            <input type="text" id="item-note" placeholder="เช่น ไม่เอาผัก, เผ็ดมาก" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:border-theme-primary bg-gray-50 transition-colors">
          </div>
          
          <div class="flex items-center justify-center gap-5 mb-6 bg-gray-50 p-3 rounded-2xl w-max mx-auto border border-gray-100">
            <button onclick="adjustQty(-1)" class="w-10 h-10 rounded-xl bg-white text-gray-600 text-xl font-black shadow-sm border border-gray-200 active:scale-95">-</button>
            <span id="qty-display" class="text-2xl font-black text-theme-dark w-6 text-center">1</span>
            <button onclick="adjustQty(1)" class="w-10 h-10 rounded-xl bg-theme-dark text-white text-xl font-black shadow-sm active:scale-95">+</button>
          </div>
          
          <button onclick="addToCartWithToppings(${item.id})" class="w-full py-4 rounded-2xl bg-theme-primary text-white font-bold text-lg active:scale-95 shadow-lg shadow-orange-200">เพิ่มลงตะกร้า</button>
        </div>
      `;
      modal.classList.remove('hidden'); modal.classList.add('flex');
      window.selectedToppings = []; window.selectedQty = 1;
    }

    function toggleTopping(topId) {
      const idx = window.selectedToppings.indexOf(topId);
      const btn = document.getElementById(`top-${topId}`);
      if (idx >= 0) { window.selectedToppings.splice(idx, 1); btn.classList.remove('active'); btn.classList.replace('bg-green-50', 'bg-white'); btn.classList.replace('border-green-500', 'border-gray-200'); } 
      else { window.selectedToppings.push(topId); btn.classList.add('active'); btn.classList.replace('bg-white', 'bg-green-50'); btn.classList.replace('border-gray-200', 'border-green-500'); }
    }

    function adjustQty(delta) { window.selectedQty = Math.max(1, Math.min(10, window.selectedQty + delta)); document.getElementById('qty-display').textContent = window.selectedQty; }

    function addToCartWithToppings(itemId) {
      const item = menuItems.find(m => m.id === itemId);
      const selectedTops = window.selectedToppings.map(id => toppings.find(t => t.id === id)).filter(Boolean);
      cart.push({ ...item, quantity: window.selectedQty, toppings: selectedTops, note: document.getElementById('item-note').value });
      closeToppingModal(); render(); window.showToast("✅ เพิ่มลงตะกร้าแล้ว");
    }

    function closeToppingModal() { document.getElementById('topping-modal').classList.add('hidden'); document.getElementById('topping-modal').classList.remove('flex'); }
    function removeFromCart(idx) { cart.splice(idx, 1); render(); }

    function showTableSelectModal() {
      const tables = ['โต๊ะ 1', 'โต๊ะ 2', 'โต๊ะ 3', 'โต๊ะ 4', 'โต๊ะ 5', 'โต๊ะ 6', 'โต๊ะ 7', 'โต๊ะ 8', 'ซุ้ม 1', 'ซุ้ม 2', 'Walk-in (รอหน้าร้าน)'];
      const modal = document.getElementById('table-modal');

    async function submitPOSOrder(tableId) {
      let copyStock = {...dbStock}; let isOk = true; let badItem = "";
      cart.forEach(item => {
        (item.ingredients || []).forEach(ing => { const ded = 1 * item.quantity; if(copyStock[ing] !== undefined) { copyStock[ing] -= ded; if(copyStock[ing] < 0) { isOk=false; badItem=ing; } } });
        (item.toppings || []).forEach(top => { const ded = 1 * item.quantity; if(copyStock[top.ingredient] !== undefined) { copyStock[top.ingredient] -= ded; if(copyStock[top.ingredient] < 0) { isOk=false; badItem=top.ingredient; } } });
      });
      if(!isOk) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${badItem}" ไม่พอ`);

      const total = cart.reduce((sum, item) => sum + (item.price + (item.toppings||[]).reduce((t, top)=>t+top.price,0)) * item.quantity, 0);
      const orderType = tableId.includes('Walk-in') ? 'takeaway' : (isPreorder ? 'preorder' : 'dine-in');
      
      const payload = {};
      cart.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type:orderType, pickupTime: isPreorder ? preorderTime : '' }; });

      await db.ref(`orders/${tableId}`).update(payload);
      await db.ref('stock').update(copyStock);
      
      cart = []; isPreorder = false; preorderTime = '';
      closeTableModal(); currentView = 'staff'; render();
      window.showToast("✅ ส่งออเดอร์เข้าครัวเรียบร้อย!");
    }

    async function submitCustomerOrder() {
      if (sharedCart.length === 0) return window.showToast("ตะกร้าว่างเปล่า ไม่สามารถส่งได้");
      
      let copyStock = {...dbStock}; let isOk = true; let badItem = "";
      sharedCart.forEach(item => {
        (item.ingredients || []).forEach(ing => { const ded = 1 * item.quantity; if(copyStock[ing] !== undefined) { copyStock[ing] -= ded; if(copyStock[ing] < 0) { isOk=false; badItem=ing; } } });
        (item.toppings || []).forEach(top => { const ded = 1 * item.quantity; if(copyStock[top.ingredient] !== undefined) { copyStock[top.ingredient] -= ded; if(copyStock[top.ingredient] < 0) { isOk=false; badItem=top.ingredient; } } });
      });
      
      if(!isOk) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${badItem}" ไม่พอครับ`);

      const payload = {};
      sharedCart.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type:'dine-in', pickupTime:''}; });

      await db.ref(`orders/${currentTable}`).update(payload);
      await db.ref('stock').update(copyStock);
      await db.ref(`carts/${currentTable}`).remove();
      
      document.getElementById('shared-cart-modal').classList.add('hidden'); document.getElementById('shared-cart-modal').classList.remove('flex');
      window.showToast("✅ ส่งออเดอร์เข้าครัวเรียบร้อย!");
    }

    async function cancelCustomerOrder(orderId, orderStr) {
      if(confirm("ยืนยันการยกเลิกเมนูนี้ใช่หรือไม่?")) {
          const o = JSON.parse(decodeURIComponent(orderStr));
          let ret = {};
          (o.ingredients || []).forEach(ing => { ret[ing] = (dbStock[ing]||0) + (1 * o.quantity); });
          (o.toppings || []).forEach(top => { ret[top.ingredient] = (dbStock[top.ingredient]||0) + (1 * o.quantity); });
          
          await db.ref(`orders/${currentTable}/${orderId}`).remove();
          if(Object.keys(ret).length > 0) await db.ref('stock').update(ret);
          window.showToast("✅ ยกเลิกสำเร็จ");
      }
    }

                      </div>
                    </div>
                    ${hasOrder ? `<div class="text-right"><div class="text-xs text-gray-500 font-bold mb-1">ยอดรวม</div><div class="text-2xl font-black text-theme-primary bg-orange-50 px-3 py-1 rounded-xl">฿${totalBill}</div></div>` : ''}
                  </div>
                  
                  ${hasOrder ? `
                    <div class="bg-gray-50 rounded-xl p-3 mb-4 max-h-32 overflow-y-auto custom-scroll border border-gray-200">
                      ${orders.map(o => `
                        <div class="text-xs font-bold flex justify-between text-gray-700 py-1 border-b border-gray-100 last:border-0">
                          <span>${o.emoji} ${o.name} <span class="text-gray-400 ml-1">x${o.quantity}</span></span>
                          <span class="text-theme-primary">฿${(o.price + (o.toppings||[]).reduce((st,top)=>st+top.price,0)) * o.quantity}</span>
                        </div>
                      `).join('')}
                    </div>
                    <div class="flex gap-3">
                      <button onclick="printReceipt('${t}')" class="flex-1 py-3 rounded-xl bg-slate-800 text-white text-sm font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">🖨️ พิมพ์บิล</button>
                      <button onclick="closeTable('${t}')" class="flex-1 py-3 rounded-xl bg-red-500 text-white text-sm font-bold shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">❌ ปิดโต๊ะ</button>
                    </div>
                  ` : `
                    <div class="text-center pt-2">
                       <p class="text-xs text-gray-400 font-bold">ไม่มีรายการอาหาร</p>
                    </div>
                  `}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    async function closeTable(tableId) {
      if(confirm(`ยืนยันการปิดโต๊ะและเคลียร์บิล ${tableId} ?\n(QR Code เดิมจะถูกยกเลิกด้วย)`)) {
          await db.ref(`orders/${tableId}`).remove();
          await db.ref(`carts/${tableId}`).remove();
          await db.ref(`table_sessions/${tableId}`).remove();
          window.showToast(`✅ ปิด ${tableId} เรียบร้อยแล้ว`);
      }
    }

    window.printReceipt = (t) => {
      const orders = allOrders[t] ? Object.values(allOrders[t]) : [];
      if(orders.length === 0) return window.showToast(`❌ ไม่พบข้อมูลสั่งอาหารของ ${t}`);
      
      let total = 0;
      let html = `
        <div style="text-align:center; margin-bottom: 15px;">
          <h2 style="margin:0; font-size:18px; font-weight:bold;">${config.shop_name}</h2>
          <p style="margin:0; font-size:12px;">${config.shop_address}</p>
          <p style="margin:8px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 5px 0; font-size:14px; font-weight:bold;">โต๊ะ/คิว: ${t}</p>
          <p style="margin:0; font-size:11px;">วันที่: ${new Date().toLocaleString('th-TH')}</p>
        </div>
        <table style="width:100%; font-size:13px; border-collapse: collapse; margin-bottom: 15px;">
      `;
      
      orders.forEach(i => {
        const itemTotal = (i.price + (i.toppings||[]).reduce((s,top)=>s+top.price,0)) * i.quantity;
        total += itemTotal;
        html += `
          <tr>
            <td style="padding: 3px 0;">${i.name} ${i.toppings?.length ? `<br><span style="font-size:11px; color:#555;">+${i.toppings.map(x=>x.name).join(', ')}</span>` : ''}</td>
            <td style="text-align:center; padding: 3px 0; vertical-align: top;">x${i.quantity}</td>
            <td style="text-align:right; padding: 3px 0; vertical-align: top;">${itemTotal}</td>
          </tr>
        `;
      });
      
      html += `
        </table>
        <div style="text-align:center;">
          <p style="margin:8px 0; border-top: 1px dashed black; padding-top: 8px; font-size: 16px; font-weight:bold;">ยอดรวม: ฿${total}</p>
          <p style="margin:10px 0 0 0; font-size:12px; font-weight:bold;">ขอบคุณที่ใช้บริการ 🙏</p>
        </div>
      `;
      
      document.getElementById('receipt-print').innerHTML = html;
      setTimeout(() => { window.print(); }, 300);
    };

    // เริ่มต้นระบบ
    initApp();

  </script>
</body>
</html>
