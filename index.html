        window.onload = async () => {
            try {
                // 1. ดึงข้อมูล Firebase Real-time
                db.ref('stock').on('value', snap => { 
                    if(!snap.exists()) { db.ref('stock').set(initStock); state.stock = initStock; } 
                    else { state.stock = snap.val(); } 
                    if(state.view !== 'loader' && state.view !== 'auth') renderApp(); 
                });
                
                db.ref('orders').on('value', snap => { 
                    state.orders = snap.val() || {}; 
                    if(state.view === 'staff' && state.activeTab === 'kds') renderApp(); 
                    if(state.view === 'customer') renderApp();
                });

                // 2. เช็คเส้นทางเข้าเว็บ (สแกนคิวอาร์โค้ด หรือ เข้าตรงๆ)
                const urlParams = new URLSearchParams(window.location.search);
                const pTable = urlParams.get('table'); const pToken = urlParams.get('token');

                if (pTable && pToken) {
                    const snap = await db.ref(`table_sessions/${pTable}`).once('value');
                    if (snap.exists() && snap.val() === pToken) {
                        state.tableNo = pTable; state.mode = 'customer';
                        db.ref(`carts/${pTable}`).on('value', cSnap => { 
                            state.cartShared = cSnap.val() ? JSON.parse(cSnap.val()) : {}; 
                            if(state.view === 'customer') renderApp(); 
                        });
                        if(localStorage.getItem('pdpa_ok') === 'true') { setView('customer'); } 
                        else { setView('pdpa_cust'); }
                    } else { throw new Error("QR Code นี้หมดอายุ หรือสแกนผิดป้ายครับ"); }
                } else {
                    await liff.init({ liffId: LIFF_ID });
                    if (liff.isLoggedIn()) { 
                        const profile = await liff.getProfile(); 
                        const snap = await db.ref(`users/${profile.userId}`).once('value');
                        if (snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'staff')) { 
                            state.staffName = profile.displayName; state.mode = 'staff'; setView('staff'); window.showToast(`ยินดีต้อนรับ ${state.staffName}`);
                        } else {
                            if (!snap.exists()) await db.ref(`users/${profile.userId}`).set({ name: profile.displayName, role: 'pending' });
                            throw new Error("ระบบบันทึกข้อมูลแล้ว โปรดแจ้งแอดมินให้อนุมัติสิทธิ์");
                        }
                    } else { setView('auth'); }
                }
            } catch(e) { 
                console.warn(e);
                // โหมดจำลองสำหรับเทสในคอมพิวเตอร์
                if(e.message.includes("liffId")) {
                    state.staffName = "ผู้ดูแลระบบ (ทดสอบ)"; state.mode = 'staff'; setView('staff'); window.showToast("เข้าสู่โหมดจำลอง (Test Mode)");
                } else {
                    document.getElementById('error-message').innerText = e.message;
                    document.querySelectorAll('.app-view').forEach(el => el.style.display = 'none');
                    document.getElementById('view-error').style.display = 'flex';
                }
            }
        };

        window.loginLINE = () => { if(!liff.isLoggedIn()) liff.login(); };
        window.logoutLINE = () => { if(liff.isLoggedIn()) liff.logout(); location.reload(); };

        // --- ลูกค้ายกเลิกออเดอร์ ---
        window.cancelCustOrd = async (orderId) => {
            if(confirm("ยืนยันการยกเลิกเมนูนี้ใช่หรือไม่?")) {
                const o = state.orders[state.tableNo][orderId]; if(!o) return;
                let returns = {}; Object.entries(o.stockDeductions || {}).forEach(([ing, amt]) => { returns[ing] = (state.stock[ing] || 0) + amt; });
                await db.ref(`orders/${state.tableNo}/${orderId}`).remove(); 
                if(Object.keys(returns).length > 0) await db.ref('stock').update(returns);
                window.showToast("✅ ยกเลิกสำเร็จ คืนสต๊อกแล้ว");
            }
        };

        // --- พนักงาน KDS & Stock ---
        window.kdsAct = (table, id, status, name) => {
            db.ref(`orders/${table}/${id}`).update({ status: status }).then(() => {
                if(status === 'preparing') playVoice(`รับออเดอร์ กำลังทำเมนู ${name}`);
                if(status === 'done') playVoice(`เมนู ${name} โต๊ะ ${table} ทำเสร็จแล้วครับ`);
            });
        };
        window.updateStockItem = (ing, delta) => { let newVal = (state.stock[ing] || 0) + delta; if(newVal < 0) newVal = 0; db.ref(`stock/${ing}`).set(newVal); };

        // --- พนักงาน POS Time Toggle ---
        window.togglePosTime = () => { 
            const sel = document.getElementById('pos-type-input').value; 
            const box = document.getElementById('pos-time-box'); 
            if(sel === 'preorder') { box.style.display = 'flex'; } else { box.style.display = 'none'; } 
        };

        // --- พนักงาน Admin ---
        window.generateQRCode = () => {
            const t = document.getElementById('admin-qr-sel').value; const k = Math.random().toString(36).substring(2,10);
            db.ref(`table_sessions/${t}`).set(k).then(() => { 
                const url = `${window.location.origin}${window.location.pathname}?table=${encodeURIComponent(t)}&token=${k}`; 
                alert(`เปิดโต๊ะ ${t} สำเร็จ!\n\nลิงก์สำหรับลูกค้า:\n${url}`); 
                window.showToast("✅ สร้างลิงก์โต๊ะ สำเร็จ!"); 
            });
        };

        window.clearTable = () => {
            const t = document.getElementById('admin-bill-sel').value;
            if(confirm(`ยืนยันการเคลียร์ข้อมูลโต๊ะ ${t} ?\n(บิลและ QR Code เก่าจะถูกลบทิ้ง)`)) {
                db.ref(`orders/${t}`).remove(); db.ref(`carts/${t}`).remove(); db.ref(`table_sessions/${t}`).remove(); window.showToast(`✅ ปิดโต๊ะ ${t} เรียบร้อยแล้ว`);
            }
        };

        window.printBill = async () => {
            const t = document.getElementById('admin-bill-sel').value; const snap = await db.ref(`orders/${t}`).once('value'); const ordObj = snap.val();
            if(!ordObj) return window.showToast(`❌ ไม่มีรายการอาหารที่โต๊ะ ${t}`);
            let html = `<div style="text-align:center; margin-bottom: 10px;"><h2 style="margin:0; font-size:16px;">${SHOP_NAME}</h2><p style="margin:0; font-size:12px;">${SHOP_ADDR}</p><p style="margin:5px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 5px 0; font-weight:bold;">โต๊ะ/คิว: ${t}</p></div><table style="width:100%; font-size:12px; border-collapse: collapse;">`;
            let total = 0;
            Object.values(ordObj).forEach(item => { const itemTot = item.price * item.qty; total += itemTot; html += `<tr><td style="padding: 2px 0;">${item.name} ${item.topping ? `<br><span style="font-size:10px; color:#555;">+${item.topping}</span>` : ''}</td><td style="text-align:center;">x${item.qty}</td><td style="text-align:right;">${itemTot}</td></tr>`; });
            html += `</table><div style="text-align:center; margin-top:10px; border-top: 1px dashed black; padding-top: 5px;"><p style="font-weight:bold; font-size:16px;">ยอดรวมทั้งสิ้น: ฿${total}</p><p style="font-size:10px;">ขอบคุณที่ใช้บริการ 🙏</p></div>`;
            document.getElementById('print-area').innerHTML = html; setTimeout(() => { window.print(); }, 300);
        };

        // --- ระบบเสียง AI ---
        window.unlockAudio = () => { state.soundReady = true; window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); document.getElementById('btn-audio').style.display = 'none'; window.showToast("✅ เปิดระบบเสียง AI สำเร็จ"); };
        function playVoice(text) { if(!state.soundReady || !('speechSynthesis' in window)) return; const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, ''); let u = new SpeechSynthesisUtterance(cleanText); u.lang = 'th-TH'; window.speechSynthesis.speak(u); }

        // ==========================================
        // 7. ระบบ MODALS กลาง (สั่งอาหาร & ตะกร้า)
        // ==========================================
        window.openAddModal = (menuId, mode) => {
            state.tempMenu = menus.find(m => m.id === menuId); state.tempTops = []; state.tempQty = 1; state.tempMode = mode;
            document.getElementById('sys-modal-content').innerHTML = `
                <div class="flex justify-between items-start mb-5"><div><h3 class="text-2xl font-black text-brand-dark mb-1 leading-tight">${state.tempMenu.name}</h3><p class="text-brand-primary font-black text-xl">฿${state.tempMenu.price}</p></div><button onclick="window.closeModal()" class="bg-slate-100 w-10 h-10 rounded-full font-bold text-slate-500 active:bg-slate-200">✕</button></div>
                <div class="bg-brand-secondary/50 p-4 rounded-2xl mb-4 border border-brand-primary/20"><label class="text-xs font-black text-brand-primary mb-3 block">🌟 เพิ่มท็อปปิ้ง (หักสต๊อกอัตโนมัติ)</label><div class="grid grid-cols-2 gap-2 max-h-[25vh] overflow-y-auto hide-scrollbar">
                    ${toppings.map(t => { const out = (state.stock[t.ingredient] !== undefined && state.stock[t.ingredient] <= 0); if(out) return ''; return `<label class="flex justify-between items-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer shadow-sm active:border-brand-primary"><div class="flex items-center gap-2"><input type="checkbox" onchange="window.toggleTopSelection('${t.name}', ${t.price}, '${t.ingredient}', this.checked)" class="w-4 h-4 accent-brand-primary"><span class="font-bold text-slate-700 text-xs">${t.name}</span></div><span class="text-brand-primary font-black text-xs">+฿${t.price}</span></label>`; }).join('') || '<div class="text-xs text-slate-400 col-span-2 text-center p-2 font-bold">ไม่มีส่วนเสริมที่พร้อมขาย</div>'}
                </div></div>
                <label class="text-[11px] font-bold text-slate-400 mb-2 block ml-1 uppercase">📝 หมายเหตุถึงพ่อครัว</label><input type="text" id="modal-add-note" placeholder="เช่น เผ็ดน้อย, ไม่ใส่ผัก" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-xl outline-none font-bold text-sm mb-6 focus:border-brand-primary transition-colors shadow-inner">
                <div class="flex items-center justify-center gap-6 mb-6 bg-slate-50 py-3 rounded-2xl w-max mx-auto px-6 border border-slate-100"><button onclick="window.adjTempQty(-1)" class="w-10 h-10 rounded-xl bg-white text-slate-600 font-black text-xl shadow-sm border border-slate-200 active:scale-95">-</button><span id="modal-add-qty" class="text-3xl font-black text-brand-dark w-8 text-center">1</span><button onclick="window.adjTempQty(1)" class="w-10 h-10 rounded-xl bg-brand-primary text-white font-black text-xl shadow-sm active:scale-95">+</button></div>
                <button onclick="window.confirmAddItem()" class="w-full py-5 bg-brand-dark text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">เพิ่มลงตะกร้า</button>`;
            document.getElementById('sys-modal').style.display = 'flex';
        };

        window.toggleTopSelection = (name, price, ingredient, isChecked) => { if(isChecked) { state.tempTops.push({ name, price, ingredient }); } else { state.tempTops = state.tempTops.filter(x => x.name !== name); } };
        window.adjTempQty = (delta) => { state.tempQty = Math.max(1, Math.min(10, state.tempQty + delta)); document.getElementById('modal-add-qty').innerText = state.tempQty; };

        window.confirmAddItem = () => {
            const noteText = document.getElementById('modal-add-note').value.trim(); let addedPrice = 0; let topNames = []; let deductions = { [state.tempMenu.main]: 1 };
            state.tempTops.forEach(t => { addedPrice += t.price; topNames.push(t.name); deductions[t.ingredient] = (deductions[t.ingredient] || 0) + 1; });
            const finalItem = { id: state.tempMenu.id, name: state.tempMenu.name, emoji: state.tempMenu.emoji, price: state.tempMenu.price + addedPrice, topping: topNames.join(', '), note: noteText, stockDeductions: deductions, qty: state.tempQty };
            const uniqueId = `c_${Date.now()}`;
            
            if(state.tempMode === 'staff') { state.cartLocal[uniqueId] = finalItem; window.showToast("✅ เพิ่มลงตะกร้าพนักงาน"); renderApp(); } 
            else { const newCart = { ...state.cartShared }; newCart[uniqueId] = finalItem; db.ref(`carts/${state.tableNo}`).set(JSON.stringify(newCart)); window.showToast("✅ เพิ่มลงตะกร้าของโต๊ะ"); }
            window.closeModal();
        };

        // --- 7.2 Modal ตะกร้า ---
        window.openCartModal = (mode) => {
            state.tempMode = mode; const isStaff = mode === 'staff';
            document.getElementById('sys-modal-content').innerHTML = `
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-4"><h3 class="text-xl font-black text-brand-dark">🛒 ${isStaff ? 'ตะกร้า POS' : 'ตะกร้าของคุณ'}</h3><button onclick="window.closeModal()" class="bg-slate-100 w-10 h-10 rounded-full font-bold text-slate-500">✕</button></div>
                ${!isStaff ? `<div class="flex gap-2 mb-4 bg-brand-secondary p-1.5 rounded-xl border border-brand-secondary"><label class="flex-1 text-center py-3 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-brand-primary has-[:checked]:shadow-sm transition-all"><input type="radio" name="cart-order-type" value="dine-in" class="hidden" checked>🍽️ ทานร้าน</label><label class="flex-1 text-center py-3 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-brand-primary has-[:checked]:shadow-sm transition-all"><input type="radio" name="cart-order-type" value="takeaway" class="hidden">🥡 กลับบ้าน</label></div>` : ''}
                <div class="flex-1 overflow-y-auto hide-scrollbar pb-4 min-h-[30vh]" id="modal-cart-item-list"></div>
                <div class="pt-5 border-t-2 border-slate-100"><div class="flex justify-between items-end mb-5 px-1"><span class="font-bold text-slate-500 text-sm">ยอดรวมทั้งสิ้น</span><span id="modal-cart-total-price" class="text-4xl font-black text-brand-primary">฿0</span></div><button onclick="window.submitCartOrder()" class="w-full py-5 bg-brand-dark text-brand-primary rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-transform">✅ ส่งออเดอร์เข้าครัว</button></div>`;
            window.renderCartContents(); document.getElementById('sys-modal').style.display = 'flex';
        };

        window.renderCartContents = () => {
            const isStaff = state.tempMode === 'staff'; const obj = isStaff ? state.cartLocal : state.cartShared; const itemsArray = Object.entries(obj);
            let total = 0; let html = "";
            if(itemsArray.length === 0) { html = '<div class="text-center py-16 text-slate-300 font-bold"><div class="text-6xl mb-4">🛒</div>ตะกร้าว่างเปล่า</div>'; } 
            else {
                itemsArray.forEach(([key, item]) => {
                    const itemTot = item.price * item.qty; total += itemTot;
                    html += `<div class="bg-slate-50 p-4 rounded-3xl border border-slate-200 flex justify-between items-center mb-3 shadow-sm"><div class="flex-1 pr-3"><div class="font-bold text-sm text-brand-dark leading-tight">${item.emoji} ${item.name}</div>${item.topping ? `<div class="text-[10px] text-brand-primary font-bold mt-1">🌟 ${item.topping}</div>` : ''}${item.note ? `<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${item.note}</div>` : ''}<div class="font-black text-brand-dark mt-2 text-lg">฿${itemTot}</div></div><div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200"><button onclick="window.adjCartItemQty('${key}', -1)" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-500 font-bold active:bg-slate-200">-</button><span class="font-black text-base w-6 text-center">${item.qty}</span><button onclick="window.adjCartItemQty('${key}', 1)" class="w-8 h-8 rounded-lg bg-brand-primary text-white font-bold active:scale-95">+</button></div></div>`;
                });
            }
            const listEl = document.getElementById('modal-cart-item-list'); const totEl = document.getElementById('modal-cart-total-price');
            if (listEl) listEl.innerHTML = html; if (totEl) totEl.innerText = `฿${total}`;
        };

        window.adjCartItemQty = (key, delta) => {
            if(state.tempMode === 'staff') { state.cartLocal[key].qty += delta; if(state.cartLocal[key].qty <= 0) delete state.cartLocal[key]; window.renderCartContents(); renderApp(); } 
            else { const newC = { ...state.cartShared }; newC[key].qty += delta; if(newC[key].qty <= 0) delete newC[key]; db.ref(`carts/${state.tableNo}`).set(JSON.stringify(newC)); setTimeout(() => { window.renderCartContents(); }, 300); }
        };

        window.submitCartOrder = async () => {
            const isStaff = (state.tempMode === 'staff'); const itemsObj = isStaff ? state.cartLocal : state.cartShared; const itemsArray = Object.values(itemsObj);
            if(itemsArray.length === 0) return window.showToast("ตะกร้าว่างเปล่า ไม่สามารถส่งได้ครับ");
            
            let orderType = ""; let targetTable = ""; let pTime = "";
            if(isStaff) {
                const elType = document.getElementById('pos-type-input'); const elTarget = document.getElementById('pos-target-input'); const elTime = document.getElementById('pos-time-input');
                if(!elType || !elTarget) { window.showToast("โปรดปิดตะกร้าเพื่อระบุข้อมูลโต๊ะก่อนครับ"); return window.closeModal(); }
                orderType = elType.value; targetTable = elTarget.value.trim() || "Walk-in"; pTime = (orderType === 'preorder' && elTime) ? elTime.value : "";
                if(orderType === 'preorder' && !pTime) return window.showToast("โปรดระบุเวลารับอาหารด้วยครับ");
            } else {
                const elType = document.querySelector('input[name="cart-order-type"]:checked'); orderType = elType ? elType.value : 'dine-in'; targetTable = state.tableNo;
            }

            let currentStockCopy = { ...state.stock }; let isStockEnough = true; let deficientIngredient = "";
            itemsArray.forEach(item => { Object.entries(item.stockDeductions || {}).forEach(([ingName, amountPerDish]) => { const totalDeduct = amountPerDish * item.qty; if(currentStockCopy[ingName] !== undefined) { currentStockCopy[ingName] -= totalDeduct; if(currentStockCopy[ingName] < 0) { isStockEnough = false; deficientIngredient = ingName; } } }); });
            if(!isStockEnough) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${deficientIngredient}" ไม่พอครับ`);

            const orderPayload = {}; itemsArray.forEach((item, index) => { const itemKey = `o_${Date.now()}_${index}`; orderPayload[itemKey] = { name: item.name, emoji: item.emoji, price: item.price, qty: item.qty, topping: item.topping || '', note: item.note || '', stockDeductions: item.stockDeductions, status: 'pending', timestamp: Date.now(), type: orderType, pickupTime: pTime }; });

            try {
                await db.ref(`orders/${targetTable}`).update(orderPayload); await db.ref('stock').update(currentStockCopy); window.closeModal();
                if(isStaff) { state.cartLocal = {}; document.getElementById('pos-target-input').value = ""; renderApp(); window.showToast("✅ ส่งออเดอร์ POS ลงครัวสำเร็จ"); } 
                else { await db.ref(`carts/${state.tableNo}`).remove(); window.showToast("✅ ส่งออเดอร์เข้าห้องครัวแล้ว!"); }
            } catch (e) { window.showToast("❌ เกิดข้อผิดพลาดในการส่งข้อมูล"); }
        };
    </script>
</body>
</html>
