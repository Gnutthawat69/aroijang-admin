    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 12px 24px; border-radius: 20px; z-index: 100000; font-weight: 500; font-size: 14px; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: max-content; max-width: 90%; text-align: center; }
    .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .hidden-view { display: none !important; }
    .sold-out { opacity: 0.5; filter: grayscale(100%); pointer-events: none; position: relative; }
    .sold-out::after { content: "วัตถุดิบหมด"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: #be123c; color: white; padding: 0.25rem 1rem; border-radius: 1rem; font-weight: bold; font-size: 0.8rem; z-index: 20; width: max-content; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    
    .modal-bg { position: fixed; inset: 0; background: rgba(31, 41, 55, 0.6); backdrop-filter: blur(4px); z-index: 99999; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s; }
    .modal-bg.show { opacity: 1; visibility: visible; }
    .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 2rem 2rem 0 0; padding: 1.5rem; transform: translateY(100%); transition: transform 0.3s; max-height: 85vh; display: flex; flex-direction: column; }
    .modal-bg.show .modal-content { transform: translateY(0); }

    #receipt-print { display: none; }
    @media print {
      body * { visibility: hidden !important; }

    async function initApp() {
      render();
      
      db.ref('stock').on('value', snap => {
          if (!snap.exists()) {
              db.ref('stock').set(initialInventory);
              dbStock = initialInventory;
          } else {
              dbStock = snap.val();
          }
          if (['customer', 'pos', 'staff'].includes(currentView)) render(); 
      });

      db.ref('orders').on('value', snap => {
          allOrders = snap.val() || {};
          if (['kitchen', 'admin', 'customer', 'staff'].includes(currentView)) render();
      });

      db.ref('orders').on('child_added', snap => {
          const tId = snap.key;
          const items = snap.val();
          Object.entries(items).forEach(([id, item]) => {
              if (item.status === 'pending' && !item.announced) {
                  let type = item.order_type === 'preorder' ? 'พรีออเดอร์' : item.order_type === 'takeaway' ? 'กลับบ้าน' : 'ทานร้าน';

                  db.ref(`orders/${tId}/${id}`).update({ announced: true });
              }
          });
      });

      checkURLParams();
    }

    async function checkURLParams() {
      const params = new URLSearchParams(window.location.search);
      const table = params.get('table');
      const token = params.get('token');
      
      if (table && token) {
        const snap = await db.ref(`table_sessions/${table}`).once('value');
        if (snap.exists() && snap.val() === token) {
          currentTable = table;
          currentToken = token;
          currentView = 'customer';
          
          db.ref(`carts/${table}`).on('value', cartSnap => {
              sharedCart = cartSnap.val() ? JSON.parse(cartSnap.val()) : [];
              if (currentView === 'customer') render();
          });
          
        } else {
          currentView = 'invalid-qr';
        }
        render();
      } else {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                const snap = await db.ref(`users/${profile.userId}`).once('value');
                if (snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'staff')) {
                    staffName = profile.displayName;
                    isLoggedIn = true;
                    currentView = 'staff'; 
                } else if (!snap.exists()) {
                    await db.ref(`users/${profile.userId}`).set({ name: profile.displayName, role: 'pending' });
                    currentView = 'pending-approval';
                } else {
                    currentView = 'pending-approval';
                }
            } else {
                currentView = 'landing';
            }
            render();
        } catch(e) {
            console.error(e);
            currentView = 'landing';
            render();
        }
      }
    }

        case 'kitchen': renderKitchen(app); break;
        case 'pos': renderPOS(app); break;
        case 'qr-gen': renderQRGenerator(app); break;
        case 'admin': renderAdmin(app); break;
        case 'customer': renderCustomerView(app); break;
        case 'invalid-qr': renderInvalidQR(app); break;

    // ==================== KITCHEN (KDS) ====================
    function updateKDSUI() {
        const c = document.getElementById('kitchen-queue-list'); if(!c) return;
        let q = [];
        Object.keys(allOrders).forEach(t => { 
            Object.keys(allOrders[t]).forEach(id => { 
                if(allOrders[t][id].status !== 'served') q.push({t, id, ...allOrders[t][id]}); 
            }); 
        });
        q.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

        if(q.length === 0) { c.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold bg-white rounded-3xl border border-dashed border-gray-300"><div class="text-5xl mb-4">😴</div>ไม่มีคิวอาหาร พักผ่อนได้เลย</div>'; return; }
        c.innerHTML = q.map((i, idx) => {
            let badge = i.type==='preorder'?`<div class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-lg font-bold animate-pulse mt-2 border border-yellow-300 shadow-sm">⏰ รับ: ${i.pickupTime}</div>`:i.type==='takeaway'?`<div class="bg-gray-100 text-gray-500 text-[10px] px-2 py-1 rounded-lg font-bold mt-1 border border-gray-200">🥡 กลับบ้าน</div>`:`<div class="bg-orange-100 text-orange-600 text-[10px] px-2 py-1 rounded-lg font-bold mt-1 border border-orange-200">🍽️ ทานร้าน</div>`;
            return `<div class="bg-white rounded-2xl p-5 border-l-8 ${i.status==='pending'?'border-yellow-400 pulse-yellow':'border-blue-500'} card-shadow flex flex-col justify-between"><div><div class="flex justify-between items-start mb-3"><div><span class="bg-gray-800 text-white px-2 py-1 rounded-md text-[10px] font-bold shadow-sm">คิว ${idx+1}</span><h2 class="text-lg font-bold text-gray-800 mt-2 leading-tight">${i.name} <span class="text-orange-500 ml-1">x${i.qty}</span></h2></div><div class="text-right"><div class="text-xl font-black text-gray-800">${i.t}</div>${badge}</div></div>${i.topping||i.note?`<div class="bg-gray-50 rounded-lg p-2 mb-4 border border-gray-200">${i.topping?`<div class="text-xs font-bold text-orange-500 mb-1">🌟 ${i.topping}</div>`:''}${i.note?`<div class="text-xs font-bold text-red-500">📌 ${i.note}</div>`:''}</div>`:'<div class="h-2"></div>'}</div><div class="flex gap-2 mt-auto">${i.status==='pending'?`<button onclick="window.kdsAction('${i.t}','${i.id}','preparing','${i.name}')" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition-transform shadow-md">👨‍🍳 รับออเดอร์</button>`:`<button onclick="window.kdsAction('${i.t}','${i.id}','done','${i.name}')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-2.5 rounded-xl active:scale-95 transition-transform shadow-md">✅ ทำเสร็จ</button>`}</div></div>`;
        }).join('');
    }

    window.kdsAction = (t, id, stat, name) => {
        db.ref(`orders/${t}/${id}`).update({status:stat}).then(() => {
            if(stat === 'preparing') playVoice(`รับออเดอร์ กำลังทำเมนู ${name}`);
            if(stat === 'done') playVoice(`เมนู ${name} โต๊ะ ${t} เสร็จเรียบร้อยครับ`);
        });
    };

    window.unlockAudio = () => {
        soundReady = true; let u = new SpeechSynthesisUtterance(""); window.speechSynthesis.speak(u); 
        document.getElementById('btn-sound-unlock').classList.add('hidden-view'); window.showToast("✅ เปิดเสียงสำเร็จ");
    };

    function playVoice(text) {
        if(!soundReady || !('speechSynthesis' in window)) return;
        const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
        let u = new SpeechSynthesisUtterance(cleanText); u.lang = 'th-TH'; u.rate = 1.0; window.speechSynthesis.speak(u);
    }

    function renderStockManagement() {
        const container = document.getElementById('stock-list-container'); if(!container) return;
        const ingredients = Object.keys(dbStock).sort();
        let html = '';
        ingredients.forEach(ing => {
            const qty = dbStock[ing]; const isLow = qty <= 10;
            html += `
                <div class="bg-gray-50 p-3 rounded-xl border ${isLow ? 'border-red-200' : 'border-gray-200'} flex justify-between items-center shadow-sm">
                    <div>
                        <div class="font-bold text-gray-800 text-sm">${ing}</div>
                        <div class="text-[11px] ${isLow ? 'text-red-500 font-black' : 'text-green-600 font-bold'} mt-1 bg-white px-2 py-0.5 rounded inline-block border ${isLow ? 'border-red-100' : 'border-green-100'}">คงเหลือ: ${qty}</div>
                    </div>
                    <div class="flex gap-1 items-center bg-white p-1 rounded-lg border border-gray-200">
                        <button onclick="window.updateStockItem('${ing}', -1)" class="w-8 h-8 rounded bg-gray-100 text-gray-600 font-bold active:scale-95">-1</button>
                        <span class="w-8 text-center font-black text-lg text-gray-800">${qty}</span>
                        <button onclick="window.updateStockItem('${ing}', 1)" class="w-8 h-8 rounded bg-orange-500 text-white font-bold active:scale-95">+</button>
                        <button onclick="window.updateStockItem('${ing}', 10)" class="px-2 h-8 rounded bg-orange-100 text-orange-600 font-bold active:scale-95 text-xs">+10</button>
                    </div>
                </div>`;
        });
        container.innerHTML = html;
    }

    window.updateStockItem = (ing, delta) => {
        let newVal = (dbStock[ing] || 0) + delta; if(newVal < 0) newVal = 0;
        db.ref(`stock/${ing}`).set(newVal);
    };

        });

    window.showAddModal = (id) => {
        selectedMenu = menus.find(x => x.id === id);
        document.getElementById('m-add-name').innerText = selectedMenu.name; document.getElementById('m-add-price').innerText = `฿${selectedMenu.price}`; document.getElementById('m-add-note').value = "";
        let topsHtml = "";
        toppings.forEach(t => {
            if(dbStock[t.useStock] > 0 || dbStock[t.useStock] === undefined) {
                topsHtml += `<label class="flex justify-between items-center p-3 bg-white rounded-lg border border-gray-200 cursor-pointer shadow-sm hover:border-orange-500"><div class="flex items-center gap-2"><input type="checkbox" class="t-chk w-4 h-4 accent-orange-500" data-name="${t.name}" data-price="${t.price}" data-stock="${t.useStock}"><span class="font-bold text-gray-700 text-sm">${t.name}</span></div><span class="text-orange-600 font-black text-sm">+฿${t.price}</span></label>`;
            }
        });
        document.getElementById('m-add-toppings').innerHTML = topsHtml || '<div class="text-xs text-gray-400 p-2 font-bold">ไม่มีส่วนเสริมที่พร้อมให้บริการ</div>';
        document.getElementById('modal-add').classList.add('show');
    };

    window.confirmAdd = () => {
        const note = document.getElementById('m-add-note').value.trim(); let addPrice = 0, tNames = [], deductions = { [selectedMenu.main]: 1 };
        document.querySelectorAll('.t-chk:checked').forEach(c => { addPrice += parseInt(c.dataset.price); tNames.push(c.dataset.name); deductions[c.dataset.stock] = (deductions[c.dataset.stock] || 0) + 1; });
        const item = { id: selectedMenu.id, name: selectedMenu.name, price: selectedMenu.price + addPrice, main: selectedMenu.main, topping: tNames.join(", "), note, stockDeductions: deductions, qty: 1 };
        
        if(currentMode === "staff") { cartStaff[`c_${Date.now()}`] = item; window.showToast("✅ เพิ่มลงตะกร้าพนักงาน"); updateCartDisplay(); } 
        else { db.ref(`carts/${tableNo}/c_${Date.now()}`).set(item); window.showToast("✅ เพิ่มลงตะกร้าสำเร็จ"); }
        window.closeModal('modal-add');

    window.openCart = (mode) => {
        if(mode === 'customer') { document.getElementById('m-cart-type-box').classList.remove('hidden-view'); document.getElementById('m-cart-title').innerText = "🛒 ตะกร้าสินค้าของคุณ"; } 
        else { document.getElementById('m-cart-type-box').classList.add('hidden-view'); document.getElementById('m-cart-title').innerText = "🛒 ตะกร้า (POS)"; }
        updateCartDisplay(); document.getElementById('modal-cart').classList.add('show');

    function updateCartDisplay() {
        const isStaff = currentMode === "staff"; const items = Object.entries(isStaff ? cartStaff : cartCustomer); let tot = 0, c = 0, html = "";
        if(items.length === 0) { html = '<div class="text-center py-16 text-gray-400 font-bold"><div class="text-6xl mb-4 opacity-30">🛒</div>ตะกร้าว่างเปล่า</div>'; } 
        else {
            items.forEach(([k, i]) => {
                tot += (i.price * i.qty); c += i.qty;
                html += `<div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-between items-center"><div class="flex-1 pr-2"><div class="font-bold text-sm text-gray-800 leading-tight">${i.name}</div>${i.topping ? `<div class="text-[10px] text-orange-600 font-bold mt-1">🌟 ${i.topping}</div>`:''}${i.note ? `<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${i.note}</div>`:''}<div class="font-black text-gray-800 mt-1">฿${i.price*i.qty}</div></div><div class="flex items-center gap-2 bg-white p-1 rounded-lg border border-gray-200 shadow-sm"><button onclick="window.adjQty('${k}',-1, ${isStaff})" class="w-7 h-7 rounded font-bold text-gray-500">-</button><span class="font-black text-sm w-5 text-center">${i.qty}</span><button onclick="window.adjQty('${k}',1, ${isStaff})" class="w-7 h-7 bg-orange-500 text-white rounded font-bold">+</button></div></div>`;
            });
        }
        document.getElementById('m-cart-items').innerHTML = html; document.getElementById('m-cart-total').innerText = `฿${tot}`;
        if(!isStaff && document.getElementById('cust-cart-badge')) document.getElementById('cust-cart-badge').innerText = c;
        if(isStaff && document.getElementById('pos-cart-badge')) { document.getElementById('pos-cart-badge').innerText = c; document.getElementById('pos-cart-total').innerText = `฿${tot}`; }
    }

    window.adjQty = (k, d, isStaff) => {
        if(isStaff) { const n = cartStaff[k].qty + d; if(n<=0) delete cartStaff[k]; else cartStaff[k].qty = n; updateCartDisplay(); } 
        else { const n = cartCustomer[k].qty + d; if(n<=0) db.ref(`carts/${tableNo}/${k}`).remove(); else db.ref(`carts/${tableNo}/${k}`).update({qty:n}); }
    };

    window.submitCart = () => {
        const isStaff = currentMode === "staff"; const items = Object.values(isStaff ? cartStaff : cartCustomer);
        if(items.length === 0) return window.showToast("ตะกร้าว่างเปล่า ไม่สามารถส่งได้");
        let type = "", target = "", pTime = "";
        if(isStaff) {
            type = document.getElementById('pos-type').value; target = document.getElementById('pos-table-name').value.trim() || "Walk-in"; pTime = type === 'preorder' ? document.getElementById('pos-time').value : "";
            if(type === 'preorder' && !pTime) return window.showToast("กรุณาระบุเวลารับอาหาร");
        } else { type = document.querySelector('input[name="cartType"]:checked').value; target = tableNo; }

        let copyStock = {...dbStock}; let isOk = true; let badItem = "";
        items.forEach(i => { Object.entries(i.stockDeductions).forEach(([n, a]) => { const totalDed = a * i.qty; if(copyStock[n] !== undefined) { copyStock[n] -= totalDed; if(copyStock[n] < 0) { isOk=false; badItem=n; } } }); });
        if(!isOk) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${badItem}" ไม่พอ`);

        const payload = {}; items.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type:type, pickupTime:pTime}; });

        db.ref(`orders/${target}`).update(payload).then(() => {
            db.ref('stock').update(copyStock); window.closeModal('modal-cart');
            if(isStaff) { cartStaff = {}; document.getElementById('pos-table-name').value = ""; document.getElementById('pos-time').value = ""; updateCartDisplay(); window.showToast("✅ บันทึกออเดอร์ลงครัว"); } 
            else { db.ref(`carts/${tableNo}`).remove(); window.showToast("✅ ส่งออเดอร์เข้าครัวเรียบร้อย!"); }
        });
    };

    // ==========================================
    // CUSTOMER UI
    // ==========================================
    function renderCustomerView(container) {
        container.innerHTML = `
            <div class="gradient-bg text-white p-4 sticky top-0 z-40 card-shadow flex justify-between items-center">
                <div><div class="text-sm font-medium opacity-90">${config.shop_name}</div><div class="text-2xl font-black" id="cust-table-label">โต๊ะ --</div></div>
                <button onclick="window.openCart('customer')" class="relative bg-white w-14 h-14 rounded-full flex items-center justify-center text-2xl card-shadow active:scale-95 transition-transform">🛒<span id="cust-cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] w-6 h-6 rounded-full flex items-center justify-center font-bold border-2 border-white">0</span></button>
            </div>
            <div class="bg-white border-b border-gray-200 p-2 overflow-x-auto hide-scrollbar sticky top-[82px] z-30 shadow-sm"><div class="flex gap-2 min-w-max px-2" id="cust-categories"></div></div>
            <div class="flex-1 overflow-auto p-4 pb-10">
                <div id="cust-orders-container" class="mb-6 hidden-view"><div class="text-sm font-black text-gray-800 mb-3 flex items-center gap-2"><span>📋</span> ออเดอร์ของคุณ</div><div id="cust-orders-list" class="space-y-3"></div></div>
                <h2 class="font-black text-gray-800 text-lg mb-4">เมนูอาหาร</h2><div class="menu-grid" id="cust-menu-grid"></div>
            </div>
        `;
    }

    function buildOrdersList(orders) {
        const c = document.getElementById('cust-orders-list'); const arr = Object.entries(orders);
        if(arr.length === 0) { document.getElementById('cust-orders-container').classList.add('hidden-view'); return; }
        document.getElementById('cust-orders-container').classList.remove('hidden-view');
        c.innerHTML = arr.map(([id, item]) => {
            let ui = item.status==='pending'?'<span class="text-yellow-600 bg-yellow-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-yellow-200">⏳ รอคิว</span>' :item.status==='preparing'?'<span class="text-blue-600 bg-blue-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-blue-200">🍳 กำลังปรุง</span>' :'<span class="text-green-600 bg-green-50 px-2 py-1 rounded-lg text-[10px] font-bold border border-green-200">✅ เสิร์ฟแล้ว</span>';
            let btn = item.status==='pending'?`<button onclick="window.cancelMyOrder('${id}','${encodeURIComponent(JSON.stringify(item.stockDeductions))}',${item.qty})" class="text-[10px] text-red-500 font-bold border border-red-200 bg-red-50 px-3 py-1.5 rounded-xl active:scale-95 transition-all shadow-sm">ยกเลิก</button>`:'';
            return `<div class="bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center shadow-sm"><div class="flex-1"><div class="text-sm font-bold text-gray-800">${item.name} <span class="text-gray-400 text-xs ml-1 font-black">x${item.qty}</span></div>${item.topping ? `<div class="text-[10px] text-orange-600 font-bold mt-1">🌟 ${item.topping}</div>` : ''}<div class="mt-2">${ui}</div></div><div>${btn}</div></div>`;
        }).join('');
    }
    
    window.cancelMyOrder = (id, strDed, qty) => {
        if(confirm("ยืนยันการยกเลิกเมนูนี้?")) {
            const d = JSON.parse(decodeURIComponent(strDed)); let ret = {};
            db.ref('stock').once('value').then(snap => {
                const c = snap.val()||{}; Object.entries(d).forEach(([n,a]) => { if(c[n]!==undefined) ret[n] = c[n]+(a*qty); });
                db.ref(`orders/${tableNo}/${id}`).remove().then(() => { if(Object.keys(ret).length>0) db.ref('stock').update(ret); window.showToast("✅ ยกเลิกสำเร็จ"); });
            });
        }
    };

    // ==========================================
    // ADMIN (จัดการโต๊ะและพิมพ์บิล)
    // ==========================================
    window.generateQR = () => {
        const t = document.getElementById('qr-table-sel').value; const token = Math.random().toString(36).substring(2,10);
        db.ref(`table_sessions/${t}`).set(token).then(() => {
            const url = `${window.location.href.split('?')[0]}?table=${encodeURIComponent(t)}&token=${token}`;
            document.getElementById('qr-result-box').classList.remove('hidden-view');
            document.getElementById('qr-img-src').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
            document.getElementById('qr-test-link').href = url; window.showToast(`สร้าง QR Code สำเร็จ`);
        });
    };

    window.clearTable = () => {
        const t = document.getElementById('clear-table-sel').value;
        if(confirm(`ยืนยันการเคลียร์โต๊ะ ${t} ?\n(QR Code เดิมจะสั่งอาหารไม่ได้อีก)`)) {
            db.ref(`orders/${t}`).remove(); db.ref(`carts/${t}`).remove(); db.ref(`table_sessions/${t}`).remove();
            window.showToast(`✅ ปิดโต๊ะ ${t} เรียบร้อยแล้ว`);
        }
    };

    window.printReceipt = async () => {
        const t = document.getElementById('clear-table-sel').value;
        const snap = await db.ref(`orders/${t}`).once('value'); const orders = snap.val();
        if(!orders) return window.showToast(`❌ ไม่พบข้อมูลการสั่งอาหารของ ${t}`);
        
        let html = `
            <div style="text-align:center; margin-bottom: 10px;">
                <h2 style="margin:0; font-size:16px;">หนูแดง อาหารตามสั่ง</h2>
                <p style="margin:0; font-size:12px;">คลองเปียะ จ.สงขลา</p>
                <p style="margin:5px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 4px 0;">โต๊ะ/คิว: ${t}</p>
                <p style="margin:0; font-size:10px;">วันที่: ${new Date().toLocaleString('th-TH')}</p>
            </div>
            <table style="width:100%; font-size:12px; border-collapse: collapse; margin-bottom: 10px;">
        `;
        
        let total = 0;
        Object.values(orders).forEach(i => {
            total += (i.price * i.qty);
            html += `<tr><td style="padding: 2px 0;">${i.name} ${i.topping ? `<br><span style="font-size:10px;">+${i.topping}</span>` : ''}</td><td style="text-align:center; padding: 2px 0; vertical-align: top;">x${i.qty}</td><td style="text-align:right; padding: 2px 0; vertical-align: top;">${i.price * i.qty}</td></tr>`;
        });
        
        html += `</table><div style="text-align:center;"><p style="margin:5px 0; border-top: 1px dashed black; padding-top: 5px; font-size: 14px; font-weight:bold;">ยอดรวม: ฿${total}</p><p style="margin:5px 0 0 0; font-size:12px;">ขอบคุณที่ใช้บริการ</p></div>`;
        document.getElementById('receipt-print').innerHTML = html;
        setTimeout(() => { window.print(); }, 200);
    };

    // ==================== START ====================
    initApp();

  </script>
</body>
</html>
