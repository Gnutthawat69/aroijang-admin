    .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }

    async function checkURLParams() {
      const params = new URLSearchParams(window.location.search);
      const table = params.get('table');
      const token = params.get('token');
      
      if (table && token) {
        // ตรวจสอบเซสชันโต๊ะ
        const snap = await db.ref('appData').orderByChild('table_id').equalTo(table).once('value');
        let isValid = false;
        snap.forEach(child => {
            const d = child.val();
            if(d.type === 'session' && d.token === token && d.is_active) isValid = true;
        });

        if (isValid) {
          currentTable = table;
          currentToken = token;
          
          // ดึงตะกร้ากลางของโต๊ะ

              }
          });

              currentView = 'customer';
          } else {

          }
        } else {

          userRole = "admin";
          currentView = 'staff';
        }
      }
      render();
    }

    async function checkStaffRole() {
        const profile = await liff.getProfile();
        staffName = profile.displayName;
        localStorage.setItem('staff_name', staffName);
        
        let staffUser = allData.find(d => d.type === 'staff' && d.userId === profile.userId);
        if (!staffUser) {
           await window.dataSdk.create({
             type: 'staff',
             userId: profile.userId,
             staff_name: staffName,
             staff_role: 'pending', 
             staff_status: 'pending'
           });
           currentView = 'pending';
        } else if (staffUser.staff_status === 'approved') {
           userRole = staffUser.staff_role;
           localStorage.setItem('user_role', userRole);
           isLoggedIn = true;
           if(localStorage.getItem('pdpa_agreed') === 'true') {
               currentView = 'staff';
           } else {
               currentView = 'pdpa_staff';
           }
        } else {
           currentView = 'pending';
        }
    }

    async function cancelCustomerOrder(orderId) {
      if(confirm("ยืนยันการยกเลิกเมนูนี้ใช่หรือไม่?")) {
          const order = allData.find(d => d.__backendId === orderId);
          if (!order || order.status !== 'pending') return;
          
          const items = JSON.parse(order.items || '[]');
          let returns = {};
          
          items.forEach(item => {
              (item.ingredients || []).forEach(ing => { returns[ing] = (inventory[ing]||0) + (item.quantity||item.qty); });
              (item.toppings || []).forEach(top => { returns[top.ingredient] = (inventory[top.ingredient]||0) + (item.quantity||item.qty); });
              if(item.stockDeductions) {
                  Object.entries(item.stockDeductions).forEach(([ing, amt]) => { returns[ing] = (inventory[ing]||0) + amt; });
              }
          });
          
          await window.dataSdk.delete(order);
          if(Object.keys(returns).length > 0) {
              db.ref('inventory').update(returns);
          }
          window.showToast("✅ ยกเลิกสำเร็จ");
      }
    }

                  ${order.topping ? `<div class="text-[10px] text-orange-600 font-bold mt-1">🌟 ${order.topping}</div>` : ''}

            ` : `

    async function acceptOrder(orderId) {
      const order = allData.find(d => d.__backendId === orderId);
      if (!order) return;
      playVoice(`รับออเดอร์ โต๊ะ ${order.table_id}`);
      await window.dataSdk.update({ ...order, status: 'cooking' });
    }

    async function completeOrder(orderId) {
      const order = allData.find(d => d.__backendId === orderId);
      if (!order) return;
      playVoice(`โต๊ะ ${order.table_id} ทำเสร็จแล้ว`);
      await window.dataSdk.update({ ...order, status: 'served' });
    }

    // ==================== SPEECH SYNTHESIS ====================
    let soundReady = false;
    window.unlockAudio = () => {
        soundReady = true;
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));

        if(btn) btn.style.display = 'none';
        window.showToast("✅ ระบบเสียงพร้อมทำงาน");
    }

    function playVoice(text) {
      if (!soundReady || !('speechSynthesis' in window)) return;
      const cleanText = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');
      const utterance = new SpeechSynthesisUtterance(cleanText);
      utterance.lang = 'th-TH'; utterance.rate = 1.0;
      speechSynthesis.speak(utterance);
    }

    // ==================== POS (Staff Order) ====================

      container.innerHTML = `

                <option value="dine-in" ${!isPreorder?'selected':''}>🍽️ ทานร้าน</option><option value="takeaway">🥡 กลับบ้าน (Walk-in)</option><option value="preorder" ${isPreorder?'selected':''}>☎️ พรีออเดอร์</option>
              </select>

            </div>
            ${isPreorder ? `
              <div class="flex items-center gap-3 bg-yellow-50 p-2.5 rounded-xl border border-yellow-200">
                <span class="font-bold text-yellow-700 text-sm pl-2">เวลารับ:</span>
                <input type="time" id="pos-time" value="${preorderTime}" onchange="preorderTime=this.value" class="flex-1 bg-white p-2 rounded-lg border border-yellow-300 font-bold text-sm outline-none">
              </div>
            ` : ''}
          </div>
          
          <div class="p-3 sticky top-[135px] z-10 bg-gray-50/90 backdrop-blur overflow-x-auto hide-scrollbar border-b border-gray-200">

          <div class="p-4 flex-1">

                    <div class="text-4xl mb-3 drop-shadow-sm">${item.emoji}</div>
                    <div class="font-bold text-[13px] text-gray-800 mb-2 h-8 flex items-center justify-center leading-tight">${item.name}</div>
                    <div class="text-orange-600 font-black text-sm bg-orange-50 px-3 py-1 rounded-full inline-block border border-orange-100">฿${item.price}</div>
                  </button>
                `;

            </div>
          </div>
          
          <button onclick="openModalCart('staff')" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[90%] max-w-md bg-gray-800 text-white py-4 rounded-2xl font-black shadow-2xl flex justify-between px-6 z-40 active:scale-95 border-2 border-gray-700 text-lg">
            <div class="flex items-center gap-2">🛒 ตะกร้า <span class="bg-orange-500 text-white px-2.5 py-0.5 rounded-md text-sm font-black shadow-inner">${cartQty}</span></div>
            <span class="text-orange-400">฿${cartTotal}</span>
          </button>
        </div>
      `;
    }

    function checkOutOfStock(item) {
      for (const ing of item.ingredients || [item.main]) {
        if ((inventory[ing] || 0) <= 0) return true;
      }
      return false;
    }

    // ==================== MODALS (เพิ่มเมนู & ตะกร้า) ====================
    window.showToppingModal = (itemId, mode) => {
      tempItem = menuItems.find(m => m.id === itemId);
      if (!tempItem) return;
      
      tempToppings = []; tempQty = 1; modalMode = mode;
      
      const modal = document.getElementById('modal-container');
      const content = document.getElementById('modal-content');
      
      content.innerHTML = `
        <div class="flex justify-between items-start mb-5">
          <div><h3 class="text-2xl font-black text-gray-800 mb-1 leading-tight">${tempItem.name}</h3><p class="text-orange-600 font-black text-xl">฿${tempItem.price}</p></div>
          <button onclick="window.closeModal()" class="bg-gray-100 w-10 h-10 rounded-full font-bold text-gray-500 active:bg-gray-200">✕</button>
        </div>
        
        <div class="bg-orange-50/50 p-4 rounded-2xl mb-4 border border-orange-100">
          <label class="text-xs font-black text-orange-600 mb-3 block">🌟 เพิ่มท็อปปิ้ง (หักสต๊อกอัตโนมัติ)</label>
          <div class="grid grid-cols-2 gap-2 max-h-[25vh] overflow-y-auto hide-scrollbar">
            ${toppings.map(t => {
              const outOfStock = (inventory[t.ingredient] || 0) <= 0;
              if (outOfStock) return '';
              return `<label class="flex justify-between items-center p-3 bg-white rounded-xl border border-gray-200 cursor-pointer shadow-sm active:border-orange-500"><div class="flex items-center gap-2"><input type="checkbox" onchange="window.toggleTopping('${t.id}', '${t.name}', ${t.price}, '${t.ingredient}', this.checked)" class="w-4 h-4 accent-orange-500"><span class="font-bold text-gray-700 text-xs">${t.name}</span></div><span class="text-orange-600 font-black text-xs">+฿${t.price}</span></label>`;

        <input type="text" id="item-note" placeholder="เช่น เผ็ดน้อย, ไม่ใส่ผัก" class="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-xl outline-none font-bold text-sm mb-6 focus:border-orange-500 transition-colors shadow-inner">
        
        <div class="flex items-center justify-center gap-6 mb-6 bg-gray-50 py-3 rounded-2xl w-max mx-auto px-6 border border-gray-100">
          <button onclick="window.adjustQty(-1)" class="w-10 h-10 rounded-xl bg-white text-gray-600 font-black text-xl shadow-sm border border-gray-200 active:scale-95">-</button>
          <span id="qty-display" class="text-3xl font-black text-gray-800 w-8 text-center">1</span>
          <button onclick="window.adjustQty(1)" class="w-10 h-10 rounded-xl bg-orange-500 text-white font-black text-xl shadow-sm active:scale-95">+</button>
        </div>
        
        <button onclick="window.addToCartFinal()" class="w-full py-5 bg-gray-800 text-white rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform">เพิ่มลงตะกร้า</button>
      `;
      
      modal.classList.remove('hidden'); modal.classList.add('flex');
      setTimeout(() => content.classList.remove('translate-y-full'), 10);
    };

    window.toggleTopping = (id, name, price, ingredient, isChecked) => {
      if (isChecked) { tempToppings.push({ id, name, price, ingredient }); } 
      else { tempToppings = tempToppings.filter(t => t.id !== id); }
    };

    window.adjustQty = (delta) => {
      tempQty = Math.max(1, Math.min(10, tempQty + delta));
      document.getElementById('qty-display').textContent = tempQty;
    };

    window.addToCartFinal = async () => {
      const note = document.getElementById('item-note').value.trim();
      let addPrice = 0; let topNames = []; let deductions = { [tempItem.main || tempItem.ingredients[0]]: 1 };
      
      tempToppings.forEach(t => { addPrice += t.price; topNames.push(t.name); deductions[t.ingredient] = (deductions[t.ingredient] || 0) + 1; });
      
      const cartItem = { id: tempItem.id, name: tempItem.name, emoji: tempItem.emoji, price: tempItem.price + addPrice, topping: topNames.join(', '), toppings: tempToppings, note: note, stockDeductions: deductions, qty: tempQty, quantity: tempQty };
      const itemKey = `c_${Date.now()}`;
      
      if (modalMode === 'staff') {
          cartLocal.push({cartKey: itemKey, ...cartItem}); window.showToast("✅ เพิ่มลงตะกร้าพนักงาน"); window.closeModal(); render(); 
      } else {
          const newCartObj = { ...cartSharedObj }; newCartObj[itemKey] = cartItem;
          await db.ref(`carts/${currentTable}`).set(JSON.stringify(newCartObj)); window.showToast("✅ เพิ่มลงตะกร้าของโต๊ะแล้ว"); window.closeModal();
      }
    };

    window.closeModal = () => {
      const modal = document.getElementById('modal-container'); const content = document.getElementById('modal-content');
      content.classList.add('translate-y-full'); setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
    };

    window.openModalCart = (mode) => {
        modalMode = mode; const isStaff = mode === 'staff';
        window.renderCartList();
        
        const modal = document.getElementById('modal-container'); const content = document.getElementById('modal-content');
        content.classList.remove('translate-y-full'); modal.classList.remove('hidden'); modal.classList.add('flex');
    };

    window.renderCartList = () => {
        const isStaff = modalMode === 'staff';
        let items = [];
        if (isStaff) { items = cartLocal; } 
        else { Object.keys(cartSharedObj).forEach(key => { items.push({ cartKey: key, ...cartSharedObj[key] }); }); }
        
        let total = 0; let html = "";
        
        if (items.length === 0) { html = '<div class="text-center py-16 text-gray-300 font-bold"><div class="text-6xl mb-4 opacity-50">🛒</div>ตะกร้าว่างเปล่า</div>'; } 
        else {
            items.forEach((i, idx) => {
                const itemTotal = i.price * (i.qty || i.quantity); total += itemTotal;
                const removeId = isStaff ? idx : i.cartKey;
                html += `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 flex justify-between items-center mb-3 shadow-sm">
                    <div class="flex-1 pr-3">
                        <div class="font-bold text-sm text-gray-800 leading-tight">${i.emoji} ${i.name}</div>
                        ${i.topping ? `<div class="text-[10px] text-orange-600 font-bold mt-1">🌟 ${i.topping}</div>` : ''}
                        ${i.note ? `<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${i.note}</div>` : ''}
                        <div class="font-black text-gray-800 mt-2 text-lg">฿${itemTotal}</div>
                    </div>
                    <div class="flex items-center gap-2 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
                        <button onclick="window.adjCartQty('${removeId}', -1)" class="w-8 h-8 rounded-lg bg-gray-100 text-gray-500 font-bold active:bg-gray-200">-</button>
                        <span class="font-black text-base w-6 text-center">${i.qty || i.quantity}</span>
                        <button onclick="window.adjCartQty('${removeId}', 1)" class="w-8 h-8 rounded-lg bg-orange-500 text-white font-bold active:scale-95">+</button>
                    </div>
                </div>`;
            });
        }
        
        document.getElementById('modal-content').innerHTML = `
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-4">
                <h3 class="text-xl font-black text-gray-800">🛒 ${isStaff ? 'ตะกร้า POS' : 'ตะกร้าของคุณ'}</h3>
                <button onclick="window.closeModal()" class="bg-gray-100 w-10 h-10 rounded-full font-bold text-gray-500">✕</button>
            </div>
            ${!isStaff ? `
            <div class="flex gap-2 mb-4 bg-orange-50 p-1.5 rounded-2xl border border-orange-100">
                <label class="flex-1 text-center py-3 rounded-xl font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-orange-600 has-[:checked]:shadow-sm transition-all"><input type="radio" name="cart-type" value="dine-in" class="hidden" checked> 🍽️ ทานร้าน</label>
                <label class="flex-1 text-center py-3 rounded-xl font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-orange-600 has-[:checked]:shadow-sm transition-all"><input type="radio" name="cart-type" value="takeaway" class="hidden"> 🥡 กลับบ้าน</label>
            </div>` : ''}
            <div class="flex-1 overflow-y-auto hide-scrollbar pb-4 min-h-[30vh]">${html}</div>
            <div class="pt-5 border-t-2 border-gray-100">
                <div class="flex justify-between items-end mb-5 px-2"><span class="font-bold text-gray-500 text-sm">ยอดรวมทั้งสิ้น</span><span class="text-4xl font-black text-orange-600">฿${total}</span></div>
                <button onclick="window.submitFinalOrder()" class="w-full py-5 bg-gray-800 text-white rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-transform">✅ ส่งออเดอร์เข้าครัว</button>
            </div>`;
    };

    window.adjCartQty = (id, delta) => {
        if (modalMode === 'staff') {
            const idx = parseInt(id); cartLocal[idx].qty += delta; if (cartLocal[idx].qty <= 0) cartLocal.splice(idx, 1);
            window.renderCartList(); render(); 
        } else {
            const newCart = { ...cartSharedObj }; newCart[id].qty += delta; if (newCart[id].qty <= 0) delete newCart[id];
            db.ref(`carts/${currentTable}`).set(JSON.stringify(newCart)); setTimeout(() => { window.renderCartList(); }, 200);
        }
    };

    window.submitFinalOrder = async () => {
        const isStaff = modalMode === 'staff'; let itemsToSubmit = [];
        if (isStaff) { itemsToSubmit = cartLocal; } else { Object.keys(cartSharedObj).forEach(key => { itemsToSubmit.push(cartSharedObj[key]); }); }
        if(itemsToSubmit.length === 0) return window.showToast("ตะกร้าว่างเปล่าครับ");
        
        let orderType = ""; let targetTable = ""; let pTime = "";
        
        if(isStaff) {
            const elType = document.getElementById('pos-type'); const elTarget = document.getElementById('pos-target'); const elTime = document.getElementById('pos-time');
            if(!elType || !elTarget) { window.showToast("โปรดปิดตะกร้าเพื่อระบุข้อมูลโต๊ะก่อนครับ"); return window.closeModal(); }
            orderType = elType.value; targetTable = elTarget.value.trim() || "Walk-in"; pTime = (orderType === 'preorder' && elTime) ? elTime.value : "";
            if(orderType === 'preorder' && !pTime) { return window.showToast("โปรดระบุเวลารับอาหารด้วยครับ"); }
        } else {
            const elType = document.querySelector('input[name="cart-type"]:checked'); orderType = elType ? elType.value : 'dine-in'; targetTable = currentTable;
        }

        let currentStockCopy = { ...inventory }; let isStockEnough = true; let deficientIngredient = "";
        
        itemsToSubmit.forEach(item => {
            Object.entries(item.stockDeductions || {}).forEach(([ingName, amountPerDish]) => {
                const totalDeduct = amountPerDish * (item.qty || item.quantity);
                if(currentStockCopy[ingName] !== undefined) {
                    currentStockCopy[ingName] -= totalDeduct;
                    if(currentStockCopy[ingName] < 0) { isStockEnough = false; deficientIngredient = ingName; }
                }
            });
        });
        
        if(!isStockEnough) { return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${deficientIngredient}" มีไม่พอครับ`); }

        const orderPayload = {};
        itemsToSubmit.forEach((item, index) => {
            const itemKey = `o_${Date.now()}_${index}`;
            orderPayload[itemKey] = { name: item.name, emoji: item.emoji, price: item.price, qty: item.qty || item.quantity, topping: item.topping || '', note: item.note || '', stockDeductions: item.stockDeductions, status: 'pending', timestamp: Date.now(), order_type: orderType, preorder_time: pTime };
        });

        try {
            await window.dataSdk.create({ type: 'order', table_id: targetTable, token: '', items: JSON.stringify(itemsToSubmit), status: 'pending', order_type: orderType, preorder_time: pTime, created_at: new Date().toISOString(), staff_name: staffName || 'ลูกค้า', total: itemsToSubmit.reduce((s, i) => s + (i.price * (i.qty || i.quantity)), 0), is_active: true });
            db.ref('inventory').update(currentStockCopy); window.closeModal();
            
            if(isStaff) { cartLocal = []; document.getElementById('pos-target').value = ""; render(); window.showToast("✅ ส่งออเดอร์ POS ลงครัวสำเร็จ"); } 
            else { await db.ref(`carts/${currentTable}`).remove(); window.showToast("✅ ส่งออเดอร์เข้าห้องครัวแล้ว!"); }
            
            announceNewOrder(targetTable, itemsToSubmit);
        } catch (e) { console.error(e); window.showToast("❌ เกิดข้อผิดพลาดในการส่งข้อมูล"); }
    };

    // ==================== QR GENERATOR ====================
    function renderQRGenerator(container) {
      const tables = ['โต๊ะ 1', 'โต๊ะ 2', 'โต๊ะ 3', 'โต๊ะ 4', 'โต๊ะ 5', 'โต๊ะ 6', 'โต๊ะ 7', 'โต๊ะ 8', 'ซุ้ม 1', 'ซุ้ม 2'];
      const activeSessions = allData.filter(d => d.type === 'session' && d.is_active);
      
      container.innerHTML = `

            <div class="flex justify-between items-center">
              <button onclick="currentView='staff';render()" class="text-white/80 hover:text-white font-bold text-sm">← กลับ</button>

          <div class="p-5">
            <div class="bg-white p-6 rounded-[2rem] card-shadow border border-gray-100">

                <select id="qr-sel" class="flex-1 bg-gray-50 border border-gray-200 rounded-xl p-4 font-bold text-gray-800 outline-none">
                  ${tables.map(t => `<option value="${t}">${t}</option>`).join('')}
                </select>
                <button onclick="window.generateQR()" class="bg-orange-500 text-white px-6 font-bold rounded-xl active:scale-95 shadow-md">สร้าง</button>

              <div id="qr-result" class="hidden mt-6 text-center bg-gray-50 p-5 rounded-2xl border border-gray-200">
                <p class="text-sm font-bold text-orange-600 mb-3">ให้ลูกค้าสแกนเพื่อสั่งอาหาร</p>
                <img id="qr-img" src="" class="mx-auto w-48 h-48 border-4 border-white rounded-xl shadow-sm mb-4">
                <a id="qr-link" href="#" target="_blank" class="text-xs text-blue-500 underline font-bold bg-white px-4 py-2 rounded-full shadow-sm">จำลองเปิดบนมือถือ</a>
              </div>
            </div>
          </div>

    window.generateQR = async () => {
      const tableId = document.getElementById('qr-sel').value;
      const token = Math.random().toString(36).substring(2, 10);
      await db.ref(`table_sessions/${tableId}`).set(token);
      await window.dataSdk.create({ type: 'session', table_id: tableId, token: token, status: 'active', created_at: new Date().toISOString(), staff_name: staffName, is_active: true });
      
      const url = `${window.location.origin}${window.location.pathname}?table=${encodeURIComponent(tableId)}&token=${token}`;
      document.getElementById('qr-result').classList.remove('hidden');
      document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
      document.getElementById('qr-link').href = url;
      window.showToast("✅ สร้าง QR Code สำเร็จ");
    }

    // ==================== ADMIN (จัดการโต๊ะและบิล) ====================
    function renderAdmin(container) {
      const tables = ['โต๊ะ 1', 'โต๊ะ 2', 'โต๊ะ 3', 'โต๊ะ 4', 'โต๊ะ 5', 'โต๊ะ 6', 'โต๊ะ 7', 'โต๊ะ 8', 'ซุ้ม 1', 'ซุ้ม 2', 'Walk-in'];
      
      container.innerHTML = `
        <div class="min-h-full bg-gray-50">
          <div class="gradient-bg text-white p-4 sticky top-0 z-10 shadow-md">
            <div class="flex justify-between items-center">
              <button onclick="currentView='staff';render()" class="text-white/80 hover:text-white font-bold text-sm">← กลับ</button>
              <div class="text-lg font-bold">💳 จัดการโต๊ะ / เช็คบิล</div>
              <div class="w-16"></div>
            </div>
          </div>
          
          <div class="p-5">
            <div class="bg-white p-6 rounded-[2rem] card-shadow border border-gray-100">
                <p class="text-[11px] text-red-500 font-bold mb-4 bg-red-50 px-3 py-2 rounded-lg inline-block border border-red-100">⚠️ คำเตือน: กรุณาพิมพ์บิลให้เรียบร้อยก่อนกด ปิดโต๊ะ ทุกครั้ง</p>
                <div class="flex flex-col gap-4">
                    <select id="bill-sel" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 font-bold text-gray-800 outline-none text-lg">
                        ${tables.map(t => `<option value="${t}">${t}</option>`).join('')}
                    </select>
                    <button onclick="window.printReceipt()" class="w-full bg-gray-800 text-white py-4 font-black rounded-2xl active:scale-95 shadow-lg text-lg flex justify-center items-center gap-2">🖨️ พิมพ์ใบเสร็จ</button>
                    <button onclick="window.clearTable()" class="w-full bg-red-500 text-white py-4 font-black rounded-2xl active:scale-95 shadow-lg text-lg flex justify-center items-center gap-2">❌ ปิดโต๊ะ (ล้างบิล)</button>
                </div>
            </div>
          </div>
        </div>
      `;
    }

    window.clearTable = async () => {
      const tableId = document.getElementById('bill-sel').value;
      if(confirm(`ยืนยันการเคลียร์ข้อมูลโต๊ะ ${tableId} ?\n(ข้อมูลออเดอร์ บิล และ QR Code เก่าจะถูกลบทั้งหมด)`)) {
          const session = allData.find(d => d.type === 'session' && d.table_id === tableId && d.is_active);
          if (session) await window.dataSdk.update({ ...session, is_active: false });
          const orders = allData.filter(d => d.type === 'order' && d.table_id === tableId);
          for (const order of orders) { await window.dataSdk.delete(order); }
          await db.ref(`table_sessions/${tableId}`).remove();
          await db.ref(`carts/${tableId}`).remove();
          window.showToast(`✅ ปิดโต๊ะ ${tableId} สำเร็จ`);
      }
    }

    window.printReceipt = async () => {
      const tableId = document.getElementById('bill-sel').value;
      const orders = allData.filter(d => d.type === 'order' && d.table_id === tableId && (d.status === 'served' || d.status === 'done'));
      
      if(orders.length === 0) return window.showToast(`❌ ไม่มีรายการอาหารที่เสิร์ฟแล้วที่โต๊ะ ${tableId}`);
      
      let html = `
        <div style="text-align: center; margin-bottom: 10px;">
          <h2 style="margin:0; font-size:16px;">${config.shop_name}</h2>
          <p style="margin:0; font-size:12px;">${config.shop_address}</p>
          <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
          <div style="font-size: 14px; font-weight: bold;">โต๊ะ/คิว: ${tableId}</div>
          <div style="font-size: 12px;">${new Date().toLocaleString('th-TH')}</div>
          <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
        </div>
        <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
      `;
      
      let grandTotal = 0;
      orders.forEach(o => {
          const items = JSON.parse(o.items || '[]');
          items.forEach(item => {
              const itemTotal = (item.price + (item.toppings||[]).reduce((s,t)=>s+t.price,0)) * (item.quantity||item.qty);
              grandTotal += itemTotal;
              html += `
                <tr>
                  <td style="padding: 2px 0;">${item.name} ${item.toppings?.length ? `<br><span style="font-size:10px; color:#555;">+${item.toppings.map(t=>t.name).join(',')}</span>` : ''}</td>
                  <td style="text-align:center; vertical-align: top;">x${item.quantity||item.qty}</td>
                  <td style="text-align:right; vertical-align: top;">${itemTotal}</td>
                </tr>
              `;
          });
      });
      
      html += `
        </table>
        <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: bold;">
          <span>ยอดรวมทั้งสิ้น</span>
          <span>฿${grandTotal}</span>
        </div>
        <div style="border-top: 1px dashed #000; margin: 10px 0;"></div>
        <div style="text-align: center; font-size: 12px;">ขอบคุณที่ใช้บริการ 🙏</div>
      `;
      
      document.getElementById('receipt-print').innerHTML = html;
      setTimeout(() => { window.print(); }, 300);
    }

    // ==================== MENU MANAGEMENT (STOCK) ====================
    function renderMenuManagement(container) {
      container.innerHTML = `
        <div class="min-h-full bg-purple-50 pb-20">
          <div class="gradient-bg text-white p-4 sticky top-0 z-10 shadow-md">
            <div class="flex justify-between items-center">
              <button onclick="currentView='staff';render()" class="text-white/80 hover:text-white font-bold text-sm">← กลับ</button>
              <div class="text-lg font-bold">📦 จัดการสต๊อก (Real-time)</div>
              <div class="w-16"></div>
            </div>
          </div>
          
          <div class="p-4">
            <div class="bg-white p-6 rounded-[2rem] card-shadow border border-purple-100">
              <p class="text-xs text-gray-500 font-bold mb-5 text-center bg-gray-50 py-2 rounded-lg">กดปุ่ม +/- เพื่ออัปเดตจำนวนทันที</p>
              <div class="space-y-3">
                ${Object.keys(inventory).sort().map(ing => {
                  const qty = inventory[ing];
                  const isLow = qty <= 10;
                  return `
                    <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border ${isLow ? 'border-red-200' : 'border-gray-100'} shadow-sm">
                      <div>
                        <div class="font-bold text-gray-800 text-sm">${ing}</div>
                        <div class="text-[10px] font-bold ${isLow ? 'text-red-500' : 'text-green-600'} mt-1 bg-white px-2 py-0.5 rounded border ${isLow ? 'border-red-100' : 'border-green-100'} inline-block">คงเหลือ: ${qty}</div>
                      </div>
                      <div class="flex gap-1 items-center bg-white p-1.5 rounded-xl border border-gray-200 shadow-sm">
                        <button onclick="window.updateStock('${ing}', -1)" class="w-8 h-8 rounded-lg bg-gray-100 text-gray-600 font-bold active:scale-95">-1</button>
                        <span class="w-8 text-center font-black text-lg text-gray-800">${qty}</span>
                        <button onclick="window.updateStock('${ing}', 1)" class="w-8 h-8 rounded-lg bg-purple-500 text-white font-bold active:scale-95">+</button>
                        <button onclick="window.updateStock('${ing}', 10)" class="px-2 h-8 rounded-lg bg-purple-100 text-purple-700 font-bold text-xs active:scale-95">+10</button>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    window.updateStock = (ing, delta) => {
        let newVal = (inventory[ing] || 0) + delta;
        if(newVal < 0) newVal = 0;
        inventory[ing] = newVal;
        db.ref('inventory').set(inventory);
    };

    // ==================== STAFF MANAGEMENT ====================
    function renderStaffManagement(container) {
      const pendingStaff = allData.filter(d => d.type === 'staff' && d.staff_status === 'pending');
      const approvedStaff = allData.filter(d => d.type === 'staff' && d.staff_status === 'approved');
      
      container.innerHTML = `
        <div class="min-h-full bg-yellow-50">
          <div class="gradient-bg text-white p-4 sticky top-0 z-10 shadow-md">
            <div class="flex justify-between items-center">
              <button onclick="currentView='staff';render()" class="text-white/80 hover:text-white font-bold text-sm">← กลับ</button>
              <div class="text-lg font-bold">👥 อนุมัติพนักงาน</div>
              <div class="w-16"></div>
            </div>
          </div>
          
          <div class="p-4 space-y-5">
            ${pendingStaff.length > 0 ? `
              <div class="bg-white rounded-[2rem] p-5 card-shadow border-l-4 border-yellow-400">
                <div class="text-lg font-bold text-yellow-600 mb-4">⏳ รอการอนุมัติ (${pendingStaff.length})</div>
                <div class="space-y-3">
                  ${pendingStaff.map(s => `
                    <div class="bg-yellow-50 rounded-2xl p-4 flex justify-between items-center shadow-sm">
                      <div>
                        <div class="font-bold text-gray-800">${s.staff_name}</div>
                        <div class="text-xs text-gray-500 mt-1">ขอสิทธิ์เข้าใช้งาน</div>
                      </div>
                      <div class="flex gap-2">
                        <button onclick="window.approveStaff('${s.__backendId}')" class="bg-green-500 text-white px-4 py-2 rounded-xl font-bold text-sm active:scale-95 shadow-md">✓ อนุมัติ</button>
                        <button onclick="window.removeStaff('${s.__backendId}')" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold text-sm active:scale-95 shadow-md">✗ ปฏิเสธ</button>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            ` : ''}
            
            <div class="bg-white rounded-[2rem] p-5 card-shadow border-l-4 border-green-400">
              <div class="text-lg font-bold text-green-600 mb-4">✅ พนักงานในระบบ (${approvedStaff.length})</div>
              <div class="space-y-3">
                ${approvedStaff.map(s => `
                  <div class="bg-green-50 rounded-2xl p-4 flex justify-between items-center shadow-sm border border-green-100">
                    <div>
                      <div class="font-bold text-gray-800">${s.staff_name}</div>
                      <div class="text-xs font-bold text-green-700 bg-green-200 px-2 py-0.5 rounded-full inline-block mt-1">${s.staff_role === 'admin' ? 'ผู้ดูแลระบบ' : 'พนักงาน'}</div>
                    </div>
                    ${s.userId !== (firebase.auth?.currentUser?.uid || '') ? `<button onclick="window.removeStaff('${s.__backendId}')" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-xl font-bold text-sm active:scale-95">ลบ</button>` : ''}
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    window.approveStaff = async (id) => { const staff = allData.find(d => d.__backendId === id); if(staff) { await window.dataSdk.update({ ...staff, staff_status: 'approved', staff_role: 'staff' }); } };
    window.removeStaff = async (id) => { if(confirm('ยืนยันการลบผู้ใช้นี้?')) { const staff = allData.find(d => d.__backendId === id); if(staff) { await window.dataSdk.delete(staff); } } };

    // ==================== SYSTEM SETTINGS ====================
    function renderSystemSettings(container) {
      const totalOrders = allData.filter(d => d.type === 'order').length;
      const totalSales = allData.filter(d => d.type === 'order').reduce((sum, o) => sum + (o.total || 0), 0);
      
      container.innerHTML = `
        <div class="min-h-full bg-purple-50">
          <div class="gradient-bg text-white p-4 sticky top-0 z-10 shadow-md">
            <div class="flex justify-between items-center">
              <button onclick="currentView='staff';render()" class="text-white/80 hover:text-white font-bold text-sm">← กลับ</button>
              <div class="text-lg font-bold">⚙️ ตั้งค่าระบบ</div>
              <div class="w-16"></div>
            </div>
          </div>
          
          <div class="p-5">
            <div class="bg-white rounded-[2rem] p-6 card-shadow border border-purple-100 space-y-4">
              <div class="text-lg font-black text-purple-900 mb-2">🔧 โซนอันตราย (Danger Zone)</div>
              
              <div class="grid grid-cols-2 gap-3 mb-4">
                  <div class="bg-gray-50 rounded-xl p-3 text-center border border-gray-200"><div class="text-xl font-bold text-gray-800">${totalOrders}</div><div class="text-xs text-gray-500">ออเดอร์</div></div>
                  <div class="bg-gray-50 rounded-xl p-3 text-center border border-gray-200"><div class="text-xl font-bold text-gray-800">฿${totalSales}</div><div class="text-xs text-gray-500">ยอดขาย</div></div>
              </div>

              <button onclick="window.clearOldOrders()" class="w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-md active:scale-95 text-base">
                🗑️ ล้างบิลเก่าที่ทำเสร็จแล้ว
              </button>
              
              <button onclick="window.resetSystem()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-md active:scale-95 text-base">
                🚨 รีเซ็ตระบบ (ลบออเดอร์ทั้งหมด)
              </button>
            </div>
          </div>
        </div>
      `;
    }

    window.clearOldOrders = async () => {
        if(confirm('ยืนยันการล้างข้อมูลบิลที่ทำเสร็จแล้ว (Served)?')) {
            const oldOrders = allData.filter(d => d.type === 'order' && d.status === 'served');
            for(const o of oldOrders) { await window.dataSdk.delete(o); }
            window.showToast(`✅ ล้างออเดอร์เก่า ${oldOrders.length} รายการ`);
        }
    };

    window.resetSystem = async () => {
        if(prompt('พิมพ์คำว่า "CONFIRM" เพื่อยืนยันการรีเซ็ตออเดอร์ทั้งหมด:') === 'CONFIRM') {
            const allO = allData.filter(d => d.type === 'order');
            for(const o of allO) { await window.dataSdk.delete(o); }
            db.ref('orders').remove(); db.ref('carts').remove(); db.ref('table_sessions').remove();
            inventory = initInventory; db.ref('inventory').set(inventory);
            window.showToast('✅ รีเซ็ตระบบสำเร็จ'); currentView = 'staff'; render();
        }
    };

    // ==================== START APP ====================
    initApp();

  </script>
 </body>
</html>
