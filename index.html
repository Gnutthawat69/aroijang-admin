                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100"><h3 class="font-black text-brand-dark mb-2 text-base">🧾 2. ปิดโต๊ะ / พิมพ์บิล</h3><p class="text-[10px] text-red-500 font-bold mb-4 bg-red-50 px-2 py-1 rounded inline-block">* พิมพ์บิลให้เรียบร้อยก่อนปิดโต๊ะ</p><select id="admin-bill-sel" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 font-bold text-sm mb-4 outline-none"><option value="โต๊ะ 1">โต๊ะ 1</option><option value="โต๊ะ 2">โต๊ะ 2</option><option value="โต๊ะ 3">โต๊ะ 3</option><option value="โต๊ะ 4">โต๊ะ 4</option><option value="โต๊ะ 5">โต๊ะ 5</option><option value="โต๊ะ 6">โต๊ะ 6</option><option value="ซุ้ม 1">ซุ้ม 1</option><option value="ซุ้ม 2">ซุ้ม 2</option><option value="Walk-in">Walk-in</option></select><div class="flex gap-2"><button onclick="window.printBill()" class="flex-1 bg-brand-dark text-brand-yellow py-4 rounded-xl font-black text-base active:scale-95 shadow-lg">🖨️ พิมพ์บิล</button><button onclick="window.clearTbl()" class="flex-1 bg-red-500 text-white py-4 rounded-xl font-black text-base active:scale-95 shadow-lg">❌ ปิดโต๊ะ</button></div></div>

        // ========================================================
        // 7. LOGIC & HELPER FUNCTIONS
        // ========================================================
        
        // --- เริ่มต้นระบบ ---
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const pTable = urlParams.get('table'); const pToken = urlParams.get('token');

            if (pTable && pToken) {
                try {
                    const snap = await db.ref(`table_sessions/${pTable}`).once('value');
                    if (snap.exists() && snap.val() === pToken) {
                        tableNo = pTable; currentMode = 'customer';
                        if(localStorage.getItem('cust_pdpa') === 'true') { initCustomerMode(); } else { renderApp('cust_pdpa'); }
                    } else { showError("สแกนไม่ได้", "QR Code นี้หมดอายุแล้วครับ"); }
                } catch(e) { showError("ข้อผิดพลาด", "ระบบเชื่อมต่อฐานข้อมูลไม่ได้"); }
            } else {
                try {
                    await liff.init({ liffId: LIFF_ID });
                    if (liff.isLoggedIn()) { checkStaffRole(); } else { renderApp('auth'); }
                } catch(e) { 
                    window.showToast("LIFF Error: โหมดทดสอบเปิดอัตโนมัติ"); 
                    staffName = "Admin"; currentMode = 'staff'; initStaffMode(); 
                }
            }
        };

        window.loginLINE = () => { if (!liff.isLoggedIn()) liff.login(); else checkStaffRole(); };
        window.logoutLINE = () => { if (liff.isLoggedIn()) liff.logout(); location.reload(); };

        async function checkStaffRole() {
            const profile = await liff.getProfile(); const snap = await db.ref(`users/${profile.userId}`).once('value');
            if (snap.exists() && (snap.val().role === 'admin' || snap.val().role === 'staff')) {
                staffName = profile.displayName; initStaffMode();
            } else if (!snap.exists()) {
                await db.ref(`users/${profile.userId}`).set({ name: profile.displayName, role: 'pending' });
                showError("รออนุมัติ", "ส่งคำขอแล้ว กรุณารอแอดมินอนุมัติสิทธิ์");
            } else { showError("รออนุมัติ", "บัญชีนี้กำลังรอการตรวจสอบ"); }
        }

        // --- ฟังก์ชันย่อย ---
        function checkStock(item) { for (const ing of item.ingredients || []) { if ((dbStock[ing] || 0) <= 0) return true; } return false; }
        
        window.updStock = (ing, d) => { let v = (dbStock[ing] || 0) + d; if(v<0) v=0; db.ref(`stock/${ing}`).set(v); };

        window.kdsAct = (t, id, stat, name) => {
            db.ref(`orders/${t}/${id}`).update({status:stat}).then(() => {
                if(stat === 'preparing') playVoice(`รับออเดอร์ กำลังทำเมนู ${name}`);
                if(stat === 'done') playVoice(`เมนู ${name} โต๊ะ ${t} เสร็จแล้วครับ`);
            });
        };

        window.unlockAudio = () => { soundReady = true; let u = new SpeechSynthesisUtterance(""); window.speechSynthesis.speak(u); document.getElementById('btn-audio').classList.add('is-hidden'); window.showToast("✅ เปิดระบบเสียง AI สำเร็จ"); };
        function playVoice(text) { if(!soundReady || !('speechSynthesis' in window)) return; const c = text.replace(/[\u{1F600}-\u{1F6FF}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, ''); let u = new SpeechSynthesisUtterance(c); u.lang = 'th-TH'; window.speechSynthesis.speak(u); }

        window.genQR = () => {
            const t = document.getElementById('admin-qr-sel').value; const token = Math.random().toString(36).substring(2,10);
            db.ref(`table_sessions/${t}`).set(token).then(() => {
                const u = `${window.location.href.split('?')[0]}?table=${encodeURIComponent(t)}&token=${token}`;
                alert(`คัดลอกลิงก์สำหรับ ${t}:\n\n${u}`); // ใช้ Alert ธรรมดากันหน้าจอซ้อน
                window.showToast("สร้าง QR สำเร็จ!");
            });
        };

        window.clearTbl = () => { const t = document.getElementById('admin-bill-sel').value; if(confirm(`ยืนยันล้างบิลและปิดโต๊ะ ${t}?`)) { db.ref(`orders/${t}`).remove(); db.ref(`carts/${t}`).remove(); db.ref(`table_sessions/${t}`).remove(); window.showToast(`✅ ปิดโต๊ะ ${t} สำเร็จ`); } };
        
        window.printBill = async () => {
            const t = document.getElementById('admin-bill-sel').value; const snap = await db.ref(`orders/${t}`).once('value'); const oObj = snap.val();
            if(!oObj) return window.showToast(`❌ ไม่มีออเดอร์ที่โต๊ะ ${t}`);
            let html = `<div style="text-align:center; margin-bottom: 10px;"><h2 style="margin:0; font-size:16px;">${SHOP_NAME}</h2><p style="margin:0; font-size:12px;">${SHOP_ADDR}</p><p style="margin:5px 0; border-top: 1px dashed black; border-bottom: 1px dashed black; padding: 4px 0; font-weight:bold;">โต๊ะ/คิว: ${t}</p></div><table style="width:100%; font-size:12px; border-collapse: collapse; margin-bottom: 10px;">`;
            let total = 0; Object.values(oObj).forEach(i => { const px = i.price * i.qty; total += px; html += `<tr><td style="padding: 2px 0;">${i.name} ${i.topping?`<br><span style="font-size:10px; color:#555;">+${i.topping}</span>`:''}</td><td style="text-align:center;">x${i.qty}</td><td style="text-align:right;">${px}</td></tr>`; });
            html += `</table><div style="text-align:center;"><p style="margin:5px 0; border-top: 1px dashed black; padding-top: 5px; font-size: 14px; font-weight:bold;">ยอดรวม: ฿${total}</p><p style="margin:5px 0 0 0; font-size:12px;">ขอบคุณที่ใช้บริการ 🙏</p></div>`;
            document.getElementById('print-area').innerHTML = html; setTimeout(() => window.print(), 200);
        };

        // --- Modals Logic (Add & Cart) ---
        window.openAddModal = (id, mode) => {
            tempMenu = menus.find(m => m.id === id); tempToppings = []; tempQty = 1;
            const content = document.getElementById('sys-modal-content');
            content.innerHTML = `
                <div class="flex justify-between items-start mb-5"><div><h3 class="text-2xl font-black text-brand-dark mb-1">${tempMenu.name}</h3><p class="text-brand-primary font-black text-xl">฿${tempMenu.price}</p></div><button onclick="window.closeModal()" class="bg-slate-100 w-10 h-10 rounded-full font-bold text-slate-500">✕</button></div>
                <div class="bg-brand-secondary/30 p-4 rounded-2xl mb-4 border border-brand-secondary"><label class="text-xs font-bold text-brand-primary mb-3 block">🌟 เพิ่มท็อปปิ้ง (หักสต๊อกอัตโนมัติ)</label><div class="grid grid-cols-2 gap-2">
                    ${toppings.map(t => { const out = (dbStock[t.useStock] !== undefined && dbStock[t.useStock] <= 0); if(out) return ''; return `<label class="flex justify-between items-center p-3 bg-white rounded-xl border border-slate-200 cursor-pointer shadow-sm"><div class="flex items-center gap-2"><input type="checkbox" onchange="toggleTop('${t.name}', ${t.price}, '${t.useStock}', this.checked)" class="w-5 h-5 accent-brand-primary"><span class="font-bold text-slate-700 text-sm">${t.name}</span></div><span class="text-brand-primary font-black text-sm">+฿${t.price}</span></label>`; }).join('') || '<div class="text-xs text-slate-400">ไม่มีส่วนเสริม</div>'}
                </div></div>
                <label class="text-xs font-bold text-slate-500 mb-2 block">📝 หมายเหตุถึงพ่อครัว</label><input type="text" id="modal-note" placeholder="เช่น เผ็ดน้อย, ไม่ใส่ผัก" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-xl outline-none font-medium text-sm mb-6 focus:border-brand-primary">
                <div class="flex items-center justify-center gap-5 mb-6 bg-slate-50 py-2 rounded-2xl w-max mx-auto border border-slate-100 px-4"><button onclick="tempQty=Math.max(1,tempQty-1); document.getElementById('m-qty').innerText=tempQty;" class="w-10 h-10 rounded-xl bg-white text-slate-600 font-black text-xl active:scale-95 shadow-sm border border-slate-200">-</button><span id="m-qty" class="text-3xl font-black text-brand-dark w-8 text-center">${tempQty}</span><button onclick="tempQty=Math.min(10,tempQty+1); document.getElementById('m-qty').innerText=tempQty;" class="w-10 h-10 rounded-xl bg-brand-primary text-white font-black text-xl active:scale-95 shadow-sm">+</button></div>
                <button onclick="confirmAdd('${mode}')" class="w-full py-4 bg-brand-primary text-white rounded-2xl font-bold active:scale-95 shadow-lg text-lg">เพิ่มลงตะกร้า</button>`;
            document.getElementById('sys-modal').classList.add('active');
        };

        window.toggleTop = (n, p, s, chk) => { if(chk) tempToppings.push({n,p,s}); else tempToppings = tempToppings.filter(x=>x.n!==n); };
        
        window.confirmAdd = (mode) => {
            const note = document.getElementById('modal-note').value.trim(); let ap=0, tn=[], deds={[tempMenu.main]:1};
            tempToppings.forEach(t => { ap+=t.p; tn.push(t.n); deds[t.s]=(deds[t.s]||0)+1; });
            // ใช้ Base64 หรือ ID อ้างอิงแทนการยัด JSON ลงใน string เพื่อป้องกัน HTML Break
            const item = { id: tempMenu.id, name: tempMenu.name, price: tempMenu.price+ap, emoji: tempMenu.emoji, topping: tn.join(', '), note, stockDeductions: deds, qty: tempQty };
            
            if(mode==='staff') { cartLocal[`c_${Date.now()}`]=item; window.showToast("✅ เพิ่มลงตะกร้าพนักงาน"); renderApp('staff'); } 
            else { db.ref(`carts/${tableNo}/c_${Date.now()}`).set(item); window.showToast("✅ เพิ่มลงตะกร้าแล้ว"); }
            window.closeModal();
        };

        window.openCartModal = (mode) => {
            const isStaff = mode === 'staff'; const itemsObj = isStaff ? cartLocal : cartShared; const items = Object.entries(itemsObj);
            let tot = 0, html = "";
            if(items.length === 0) { html = '<div class="text-center py-16 text-slate-300 font-bold"><div class="text-6xl mb-4">🛒</div>ตะกร้าว่างเปล่า</div>'; }
            else {
                items.forEach(([k, i]) => {
                    tot += (i.price * i.qty);
                    html += `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 flex justify-between items-center mb-3 shadow-sm"><div class="flex-1 pr-2"><div class="font-bold text-sm text-brand-dark leading-tight">${i.emoji} ${i.name}</div>${i.topping?`<div class="text-[10px] text-brand-primary font-bold mt-1">🌟 ${i.topping}</div>`:''}${i.note?`<div class="text-[10px] text-red-500 font-bold mt-1">📌 ${i.note}</div>`:''}<div class="font-black text-brand-dark mt-2 text-lg">฿${i.price*i.qty}</div></div><div class="flex gap-3 items-center bg-white p-1.5 rounded-xl shadow-sm border border-slate-200"><button onclick="adjCart('${k}',-1,'${mode}')" class="w-8 h-8 rounded-lg bg-slate-100 text-slate-600 font-bold active:scale-95">-</button><span class="w-6 text-center font-black text-base">${i.qty}</span><button onclick="adjCart('${k}',1,'${mode}')" class="w-8 h-8 rounded-lg bg-brand-primary text-white font-bold active:scale-95">+</button></div></div>`;
                });
            }
            const content = document.getElementById('sys-modal-content');
            content.innerHTML = `
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-4"><h3 class="text-xl font-black text-brand-dark">🛒 ${isStaff?'ตะกร้า POS':'ตะกร้าของคุณ'}</h3><button onclick="window.closeModal()" class="bg-slate-100 w-10 h-10 rounded-full font-bold text-slate-500">✕</button></div>
                ${!isStaff?`<div class="flex gap-2 mb-4 bg-brand-secondary p-1.5 rounded-xl border border-brand-secondary"><label class="flex-1 text-center py-3 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-brand-primary has-[:checked]:shadow-sm"><input type="radio" name="ct" value="dine-in" class="hidden" checked>🍽️ ทานร้าน</label><label class="flex-1 text-center py-3 rounded-lg font-bold text-sm cursor-pointer has-[:checked]:bg-white has-[:checked]:text-brand-primary has-[:checked]:shadow-sm"><input type="radio" name="ct" value="takeaway" class="hidden">🥡 กลับบ้าน</label></div>`:''}
                <div class="flex-1 overflow-y-auto hide-scrollbar pb-2 min-h-[30vh]">${html}</div>
                <div class="pt-4 border-t-2 border-slate-100"><div class="flex justify-between items-end mb-5 px-2"><span class="font-bold text-slate-500 text-sm">ยอดรวมทั้งสิ้น</span><span class="text-4xl font-black text-brand-primary">฿${tot}</span></div><button onclick="submitOrder('${mode}')" class="w-full py-5 bg-brand-dark text-brand-yellow rounded-2xl font-black text-xl active:scale-95 shadow-xl">✅ ส่งออเดอร์เข้าครัว</button></div>`;
            document.getElementById('sys-modal').classList.add('active');
        };

        window.adjCart = (k, delta, mode) => {
            if(mode === 'staff') { const n = cartLocal[k].qty + delta; if(n<=0) delete cartLocal[k]; else cartLocal[k].qty = n; window.openCartModal('staff'); renderApp('staff'); } 
            else { const n = cartShared[k].qty + delta; if(n<=0) db.ref(`carts/${tableNo}/${k}`).remove(); else db.ref(`carts/${tableNo}/${k}`).update({qty: n}); setTimeout(()=>window.openCartModal('cust'), 200); }
        };

        // --- แก้บั๊กเรื่องการลบออเดอร์ลูกค้า ---
        window.cancelOrderCust = async (orderId) => {
            if(confirm("ยกเลิกเมนูนี้ใช่หรือไม่?")) {
                const snap = await db.ref(`orders/${tableNo}/${orderId}`).once('value');
                const o = snap.val(); if(!o) return;
                let ret = {};
                Object.entries(o.stockDeductions || {}).forEach(([n,a]) => { ret[n] = (dbStock[n] || 0) + (a * o.qty); });
                await db.ref(`orders/${tableNo}/${orderId}`).remove();
                if(Object.keys(ret).length > 0) await db.ref('stock').update(ret);
                window.showToast("✅ ยกเลิกสำเร็จ คืนสต๊อกแล้ว");
            }
        };

        window.submitOrder = (mode) => {
            const isStaff = mode === 'staff'; const items = Object.values(isStaff ? cartLocal : cartShared);
            if(items.length === 0) return window.showToast("ตะกร้าว่างเปล่า");
            let type = "", target = "", pTime = "";
            
            if(isStaff) {
                const typeEl = document.getElementById('pos-type');
                const targetEl = document.getElementById('pos-name');
                if(!typeEl || !targetEl) return window.showToast("กรุณากลับไประบุข้อมูลโต๊ะ");
                type = typeEl.value; target = targetEl.value.trim() || "Walk-in"; pTime = type === 'preorder' ? document.getElementById('pos-time').value : "";
                if(type === 'preorder' && !pTime) return window.showToast("ระบุเวลารับอาหารด้วยครับ");
            } else { 
                const ctEl = document.querySelector('input[name="ct"]:checked');
                type = ctEl ? ctEl.value : 'dine-in'; target = tableNo; 
            }

            let copyStock = {...dbStock}; let ok = true; let bad = "";
            items.forEach(i => { Object.entries(i.stockDeductions).forEach(([n, a]) => { const ded = a * i.qty; if(copyStock[n] !== undefined) { copyStock[n] -= ded; if(copyStock[n] < 0) { ok=false; bad=n; } } }); });
            if(!ok) return window.showToast(`❌ สั่งไม่ได้ วัตถุดิบ "${bad}" ไม่พอครับ`);

            const payload = {}; items.forEach((i, idx) => { payload[`o_${Date.now()}_${idx}`] = {...i, status:'pending', timestamp:Date.now(), type, pickupTime:pTime}; });

            db.ref(`orders/${target}`).update(payload).then(() => {
                db.ref('stock').update(copyStock); window.closeModal();
                if(isStaff) { 
                    cartLocal = {}; 
                    if(document.getElementById('pos-name')) document.getElementById('pos-name').value=""; 
                    if(document.getElementById('pos-time')) document.getElementById('pos-time').value=""; 
                    renderApp('staff'); window.showToast("✅ บันทึกออเดอร์ลงครัว"); 
                }
                else { db.ref(`carts/${tableNo}`).remove(); window.showToast("✅ ส่งออเดอร์แล้ว!"); }
            });
        };

    </script>
</body>
</html>
